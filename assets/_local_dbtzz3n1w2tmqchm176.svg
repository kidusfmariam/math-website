
      <!-- Navigational compass mark — the signature element -->
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="18" cy="18" r="16.5" stroke="#2D4A7A" stroke-width="1"/>
        <circle cx="18" cy="18" r="2" fill="#2D4A7A"/>
        <!-- N -->
        <line x1="18" y1="3"  x2="18" y2="13" stroke="#2D4A7A" stroke-width="1.2" stroke-linecap="round"/>
        <!-- S -->
        <line x1="18" y1="23" x2="18" y2="33" stroke="#2D4A7A" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
        <!-- E -->
        <line x1="23" y1="18" x2="33" y2="18" stroke="#2D4A7A" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
        <!-- W -->
        <line x1="3"  y1="18" x2="13" y2="18" stroke="#2D4A7A" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
        <!-- N arrowhead -->
        <polygon points="18,1 16,7 20,7" fill="#2D4A7A"/>
      </svg>
