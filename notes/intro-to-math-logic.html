n M$\n  $\\mathcal M\\models_{s_2[x\\to a]} \\psi \\iff \\mathcal M\\models_{s_2}\\forall x\\psi$\n  Hence, by the induction hypothesis, it follows that\n  $\\mathcal M\\models_{s_1}\\varphi$ iff $\\mathcal M\\models_{s_2}\\varphi$.\n\n  It's sufficient to demonstrate these three cases.\n\n\u00a0\u25fb\n:::\n\nNow, we can define a few semantic notions: 1. $\\varphi$ is a **logical\ntruth** if for every structure $\\mathcal M$ and every assignment $s$,\n$\\mathcal M\\models_{s}\\varphi$.\n\n**Examples:** Let $\\varphi\\equiv \\forall x Q(x)\\rightarrow Q(y)$ where\n$Q$ is a relation with arity 1. Assume that for a given $\\mathcal M, s$,\n$\\mathcal M\\not \\models_s \\varphi$. Then, by truth table,\n$\\mathcal M\\not \\models_s Q(y)$. Hence, $\\bar s(y)$ does not satisfy\n$Q^\\mathcal  M$. But if that's the case then\n$\\mathcal M\\not \\models_s \\forall x Q(x)$ since $\\bar s(y)\\in M$ doesn't\nsatisfy $Q^\\mathcal M$. Hence $\\mathcal M\\models_s\\varphi$.\n\n**Example:** $\\exists x (P(x)\\rightarrow \\forall x P(x))$ is a logical\ntruth (why?).\n\n2\\. $\\Sigma$ **logically implies** $\\varphi$ if for every $\\mathcal M,s$\nthat make every element of $\\Sigma$ true,\n$\\mathcal M\\models _s \\varphi$.\n\n# Expressive Power of FOL\n\nA few clarification on notations:\n\n- $\\mathcal M\\models_s\\varphi$: The formula $\\varphi$ gets value $T$ in\n  the structure $\\mathcal M$ under the assignment $s$.\n\n- $s:V\\to M$ is the assignment mapping variables to $M$. $\\bar s$ is the\n  extension of $s$ to terms.\n\n::: definition\n**Definition 7**. *A set of structures $K$ is definable in a first-order\nlanguage $\\mathcal L$, if there exists a set of $\\mathcal L$-sentences\n$\\Sigma$ such that $K=\\{\\mathcal M: \\mathcal M\\models \\Sigma\\}$.*\n:::\n\nLet $\\mathcal L$ be the empty language. We claim the following:\n\n1\\. The collection $K$ of all structures $\\mathcal M$ such that $|M|=1$\nis definable in $\\mathcal L$. Define\n$\\Sigma_1=\\{\\forall x \\forall y (x=y)\\}$. Then clearly for every\n$\\mathcal M\\in K$, $\\mathcal M\\models \\Sigma_1$.\n\n2\\. For every $n$, the collection $K$ of all structures $\\mathcal M$\nwith at least $n$ elements in $M$ is definable. Define\n$\\Sigma=\\{\\exists x_1\\exists x_2\\dots \\exists x_n  \\bigwedge_{i\\ne j} \\neg (x_i=x_j) \\}$.\nThen every structure in $K$ satisfies $\\Sigma$.\n\n3\\. For every $n$, the collection $K$ of all structures $\\mathcal M$\nwith at most $n$ elements in $M$ is definable. Define\n$\\Sigma=\\{\\forall x_1\\dots \\forall x_n\\forall x_{n+1}\\bigvee_{i\\ne j} (x_i=x_j)\\}$.\nThen every structure in $K$ satisfies $\\Sigma$.\n\n4\\. The collection $K$ of all structures $\\mathcal M$ with infinite\nelements in $M$ is definable. Let\n$\\varphi_n=\\exists x_1\\exists x_2\\dots \\exists x_n  \\bigwedge_{i\\ne j} \\neg (x_i=x_j)$.\nDefine $\\Sigma=\\{\\varphi_n\\}_{n\\in \\mathbb N}$.\n\nLet our language $\\mathcal L$ now consist of a single relation $R$ of\narity 2. We define the set $K$ of all structures $\\mathcal M$ such that\n$R^\\mathcal M$is a total order. Then we have\n$\\Sigma=\\{\\forall x, \\forall y (R(x,y)\\lor R(y,x)), \\forall x \\forall y\\forall z (R(x,y)\\land R(y,z)\\rightarrow R(x,z)), \\forall x \\forall y (R(x,y)\\land R(y,x)\\rightarrow x=y)\\}$.\nThis set makes $K$ definable.\n\n**Definability Within a structure:** Let $\\mathcal M$ be a structure of\na language $\\mathcal L$ given by:\n$$\\mathcal M=\\langle \\mathbb N, +, \\cdot, i\\rangle$$ Where $i$ is the\nsuccessor function. Now, we can choose subsets of $\\mathcal M$ that are\ndefinable. This is what definability within a structure means. A\nstatement $\\varphi(x)$ defines a subset $A\\subseteq M$ if\n$\\mathcal M\\models_s \\varphi(x)\\iff s(x)\\in A$.\n\n# Applications of the Compactness Theorem\n\nWe'll state the compactness theorem without proof for now. We'll return\nto the prove once we have established soundness and completeness.\n\n::: theorem\n**Theorem 12** ([Compactness Theorem]{.sans-serif}). *A set of wff is\nsatisfiable if and only if every finite subset of it is satisfiable.*\n:::\n\nWe can now explore some interesting applications of compactness theorem.\n\nRecall that a family of structures $K$ is definable if there exists a\nset of wffs $\\Sigma$ such that\n$K=\\{\\mathcal M:\\mathcal M\\models \\Sigma\\}$.\n\nGiven the set $K$ which sis the family of all finite structures, we make\nthe following claim.\n\n**Claim:** $K$ is not definable.\n\n::: proof\n*Proof.* Let $\\Gamma = \\{\\varphi_n : n \\in \\mathbb{N}\\}$ where\n$\\varphi_n \\equiv \\exists x_1 \\exists x_2 \\dots \\exists x_n \n    \\left(\\bigwedge_{i \\neq j,\\, i,j \\leq n} \\neg(x_i = x_j)\\right)$, so\nthat any structure satisfying $\\Gamma$ must be infinite.\n\nSuppose for contradiction that $K$ is definable, i.e., there exists a\nset of wffs $\\Sigma$ whose models are exactly the finite structures.\nConsider the set $\\Sigma \\cup \\Gamma$. We claim every finite subset of\n$\\Sigma \\cup \n    \\Gamma$ is satisfiable. Let $\\Delta$ be any finite subset of\n$\\Sigma \\cup \n    \\Gamma$. Then $\\Delta \\cap \\Gamma$ is finite, so it contains only\nfinitely many sentences $\\varphi_n$; let $N$ be the largest such $n$.\nThen any structure with exactly $N$ elements satisfies every sentence in\n$\\Delta \n    \\cap \\Gamma$, and since such a structure is finite, it also\nsatisfies every sentence in $\\Delta \\cap \\Sigma$ (as $\\Sigma$ is\nsatisfied by all finite structures). Hence $\\Delta$ is satisfiable.\n\nSince every finite subset of $\\Sigma \\cup \\Gamma$ is satisfiable,\nCompactness gives us a model $\\mathcal{M} \\models \\Sigma \\cup \\Gamma$.\nSince $\\mathcal{M} \\models \\Sigma$, and the models of $\\Sigma$ are\nexactly the finite structures, $\\mathcal{M}$ must be finite. But since\n$\\mathcal{M} \n    \\models \\Gamma$, $\\mathcal{M}$ must be infinite. This is a\ncontradiction. Therefore no such $\\Sigma$ exists, and $K$ is not\ndefinable.\u00a0\u25fb\n:::\n\nNow, consider the family of graphs $G=(V,E)$. A graph has a diameter $n$\nif you can go from some vertex to another vertex by at most $n$ steps.\n\nSay that the diameter of $G$ is k if for every $u,v\\in V$ there is a\npath $uw_1\\dots w_{k-1}v$ such that\n$(u,w_1), (w_i, w_{i+1}), (w_k,v)\\in E$ for all $i\\le k$. Can we find a\n$\\Gamma$ that defines the set of all graphs with infinite diameter. We\ndefine $\\Gamma$ as: $$\\Gamma=\\{\\varphi_k:k\\in \\mathbb N\\}$$\n$\\varphi_1\\equiv \\exists x\\exists y \\neg R(x,y)\\land \\neg R(x,y)$ and\n$\\varphi_k\\equiv \\exists x\\exists y (\\neg \\exists v_1,\\dots,v_{k-1} (R(x,v_1)\\land R(v_1,v_2)\\land \\dots \\land R(v_{k-1},y))\\}$\n\n**Claim:** The family of all finite diameter graphs is not definable.\n\n::: proof\n*Proof.* Assume $\\Sigma$ defines such a family. We now define a union\n$\\Sigma \\cup \\Gamma$, where $\\Gamma$ defines the family of all infinite\ndiameter graphs. Let a finite $\\Delta \\subseteq \\Sigma \\cup \\Gamma$. We\nknow that $\\Delta=(\\Delta \\cap \\Sigma)\\cup (\\Delta \\cap \\Gamma)$. Any\n$\\Delta \\cap \\Gamma$ is finite with a maximum $k$. Then any graph with\ndiameter $k+1$ satisfies $\\Delta \\cap \\Gamma$. Since a graph of diameter\n$k+1$ has finite diameter, it is also a model of $\\Sigma$, and hence\nsatisfies $\\Delta \\cap \\Sigma$. Hence the family of finite diameter\ngraphs satisfy $\\Delta$. Since any finite subset of $\\Sigma \\cup \\Gamma$\nis satisfiable, compactness tell us that there must exist a model\n$\\mathcal M$ such that $\\mathcal M\\models \\Sigma \\cup \\Gamma$. But\n$\\mathcal M\\models \\Sigma$ implies $\\mathcal M$ has finite diameter and\n$\\mathcal M\\models \\Gamma$ implies $\\mathcal M$ has infinite diameter.\nHence, a contradiction.\u00a0\u25fb\n:::\n\nNow we see a more positive application of Compactness by exploring a\nnon-standard model of arithmetic. Consider the language for number\ntheory: $$\\mathcal L=\\{f,g, i,R, a, b\\}$$ Interpreted to a structure as:\n$$\\mathcal M=\\{+,\\cdot, s, , \\le,0,1\\}$$ We now create the set of\ntheories of the structure as:\n$$\\textsf{Th}(\\mathcal M)=\\{\\varphi: \\varphi \\text{ is a sentence in }\\mathcal L \\text{ and } \\mathcal M\\models \\varphi\\}$$\nThere exists a structure $\\mathcal N$ that satisfies every sentence in\n$\\textsf{Th}(\\mathcal M)$ but as an element with infinitely many\npredecessors. Such an $\\mathcal N$ is called a non-standard model of\narithmetic.\n\n::: theorem\n**Theorem 13**. *There exists a non-standard model $\\mathcal N$ of\narithmetic exists.*\n:::\n\n::: proof\n*Proof.* Let $c$ be a new constant symbol not in $\\mathcal{L}$, and let\n$\\mathcal{L}' = \\mathcal{L} \\cup \\{c\\}$. Define the set of sentences:\n$$\\Gamma = \\{\\varphi : \\varphi \\in \\textsf{Th}(\\mathcal{M})\\} \\cup \\{s^n(0) < c : n \\in \\mathbb{N}\\}$$\nwhere $s^n(0)$ denotes $0$ with the successor function applied $n$\ntimes, i.e., $\\underbrace{s(s(\\dots s}_{n}(0)\\dots))$.\n\nWe claim every finite subset $\\Delta \\subseteq \\Gamma$ is satisfiable.\nLet $\\Delta$ be any finite subset. Then $\\Delta$ contains only finitely\nmany sentences of the form $s^n(0) < c$; let $N$ be the largest such\n$n$. Interpret $c$ as $N+1$ in $\\mathcal{M}$. Then $\\mathcal{M}$\nsatisfies every sentence in $\\Delta \\cap \\textsf{Th}(\\mathcal{M})$ by\ndefinition, and satisfies every sentence $s^n(0) < c$ in $\\Delta$ since\n$n \\le N < N+1$. Hence $\\Delta$ is satisfiable.\n\nSince every finite subset of $\\Gamma$ is satisfiable, Compactness gives\na model $\\mathcal{N} \\models \\Gamma$. Since\n$\\mathcal{N} \\models \\textsf{Th}(\\mathcal{M})$, the structure\n$\\mathcal{N}$ satisfies every sentence true in $\\mathcal{M}$. Moreover,\n$\\mathcal{N}$ contains an element $c^{\\mathcal{N}}$ satisfying\n$s^n(0) < c^{\\mathcal{N}}$ for every $n \\in \\mathbb{N}$, meaning\n$c^{\\mathcal{N}}$ has infinitely many predecessors. Since no standard\nnatural number has infinitely many predecessors, $c^{\\mathcal{N}}$ is\nnot a standard natural number, and hence $\\mathcal{N}$ is a non-standard\nmodel of arithmetic.\u00a0\u25fb\n:::\n\n# Proof Systems in FOL\n\nLet $\\Delta$ be a proof system (Axioms + Deduction Rules) such that:\n\n**1. Soundness:** For every set of wffs $\\Sigma$ and every $\\varphi$, if\n$\\Sigma\\vdash_\\Delta \\varphi$ then $\\Sigma \\models \\varphi$.\n\n**2. Completeness:** For every $\\Sigma$ and $\\varphi$,\n$\\Sigma \\models \\varphi$ implies $\\Sigma \\vdash \\varphi$\n\n**3.** Every proof in the system $\\Delta$ is finite.\n\nThen this will be enough to prove the compactness theorem.\n\n**Claim:** Such a $\\Delta$ implies the compactness theorem.\n\n::: proof\n*Proof.* Suppose $\\Sigma$ is a set of wffs such that every finite subset\nof $\\Sigma$ is satisfiable. We wish to show $\\Sigma$ is satisfiable.\n\nSuppose for contradiction that $\\Sigma$ is unsatisfiable, i.e.,\n$\\Sigma \\models \\varphi$ for every sentence $\\varphi$ (in particular,\n$\\Sigma \\models \\varphi \\land \\neg\\varphi$ for some $\\varphi$). By\nCompleteness, $\\Sigma \\vdash_\\Delta \\varphi \\land \\neg \\varphi$.\n\nSince every proof in $\\Delta$ is finite, this proof uses only finitely\nmany hypotheses from $\\Sigma$. That is, there exists a finite subset\n$\\Delta_0 \n    \\subseteq \\Sigma$ such that\n$\\Delta_0 \\vdash_\\Delta \\varphi \\land \\neg\\varphi$. By Soundness,\n$\\Delta_0 \\models \\varphi \\land \\neg\\varphi$, meaning $\\Delta_0$ is\nunsatisfiable. But $\\Delta_0$ is a finite subset of $\\Sigma$,\ncontradicting our assumption that every finite subset of $\\Sigma$ is\nsatisfiable.\n\nTherefore $\\Sigma$ is satisfiable, and Compactness holds.\u00a0\u25fb\n:::\n\nWe now define a proof system for first order logic.\n\nLet $\\varphi, \\varphi_1, \\varphi_2,$ and $\\psi$ be arbitrary first-order\nformulae:\n\n$$\\begin{align*}\n\\textsf{L0}: & \\quad \\varphi \\lor \\neg \\varphi \\\\\n\\textsf{L1}: & \\quad \\varphi \\rightarrow (\\psi \\rightarrow \\varphi) \\\\\n\\textsf{L2}: & \\quad (\\psi \\rightarrow (\\varphi_1 \\rightarrow \\varphi_2)) \\rightarrow ((\\psi \\rightarrow \\varphi_1) \\rightarrow (\\psi \\rightarrow \\varphi_2)) \\\\\n\\textsf{L3}: & \\quad (\\varphi \\wedge \\psi) \\rightarrow \\varphi \\\\\n\\textsf{L4}: & \\quad (\\varphi \\wedge \\psi) \\rightarrow \\psi \\\\\n\\textsf{L5}: & \\quad \\varphi \\rightarrow (\\psi \\rightarrow (\\psi \\wedge \\varphi)) \\\\\n\\textsf{L6}: & \\quad \\varphi \\rightarrow (\\varphi \\lor \\psi) \\\\\n\\textsf{L7}: & \\quad \\psi \\rightarrow (\\varphi \\lor \\psi) \\\\\n\\textsf{L8}: & \\quad (\\varphi_1 \\rightarrow \\varphi_3) \\rightarrow ((\\varphi_2 \\rightarrow \\varphi_3) \\rightarrow ((\\varphi_1 \\lor \\varphi_2) \\rightarrow \\varphi_3)) \\\\\n\\textsf{L9}: & \\quad \\neg \\varphi \\rightarrow (\\varphi \\rightarrow \\psi)\n\\end{align*}$$ If $t$ is a term, $x$ is a variable, and the substitution\nwhich leads to $\\varphi[x\\mapsto t]$ is admissible, then:\n$$\\begin{align*}\n    \\textsf{L10}: & \\forall x \\varphi(x)\\rightarrow \\varphi[x\\mapsto t]\\\\\n    \\textsf{L11}: & \\varphi[x\\mapsto t]\\rightarrow \\exists x \\varphi(x)\n\\end{align*}$$ If $\\psi$ is a formula and $x$ is a variable such that\n$x\\notin \\mathrm{free}(\\psi)$ then: $$\\begin{align*}\n    \\textsf{L12}: \\forall x (\\psi\\rightarrow \\varphi(x))\\rightarrow (\\psi\\rightarrow \\forall x\\varphi(x))\\\\\n    \\textsf{L13}:\\forall x (\\varphi(x)\\rightarrow \\psi)\\rightarrow (\\exists x\\varphi(x)\\rightarrow \\psi)\n\\end{align*}$$ What's left is the symbol $=$. In our formal system, the\nbinary equality relation is defined by the following three axioms.\n\nIf $t_1,\\dots, t_n, t'_1, \\dots, t'_n$ are any terms, $R$ is an $n$-ary\nrelation symbol (for example, $=$) and $F$ is an $n$-ary function\nsymbol, then: $$\\begin{align}\n    &\\textsf{L14}: t=t\\\\\n    &\\textsf{L15}: (t_1=t'_1\\land\\dots\\land t_n=t'_n)\\rightarrow (R(t_1,\\dots,t_n)\\rightarrow R(t'_1, \\dots, t'_n))\\\\\n    &\\textsf{L16}: (t_1=t'_1\\land\\dots\\land t_n=t'_n)\\rightarrow (F(t_1,\\dots,t_n)\\rightarrow F(t'_1, \\dots, t'_n))\\\\\n\\end{align}$$\n\n  Group              Axioms     What they do\n  ------------------ ---------- ------------------------------------------------------------------------------------------------\n  Propositional      L0--L9     All laws of $\\neg$, $\\wedge$, $\\vee$, $\\rightarrow$\n  Instantiation      L10--L11   Pull $\\forall$ out / push $\\exists$ in (with admissible substitution)\n  Quantifier shift   L12--L13   Move $\\forall$/$\\exists$ past $\\rightarrow$ when the other part is independent of the variable\n  Equality Axioms    L14-L16    Define the behavior of $=$\n\nFinally, notice that $\\tau_1\\ne \\tau_2\\equiv \\neg(\\tau_1=\\tau_2)$ and\n$\\psi\\leftrightarrow \\varphi\\equiv (\\psi\\rightarrow \\varphi)\\land (\\varphi\\rightarrow \\psi)$.\n\n**Example:** Prove that $\\vdash P(x)\\rightarrow \\exists xP(x)$\n\n**Proof:** Simple instantiation of [L11]{.sans-serif}.\n\n::: definition\n**Definition 8**. *For a set of formulas $\\Gamma$ and a formula\n$\\alpha$, we write $\\Gamma \\vdash \\alpha$ iff $\\alpha$ belongs to the\ninductive set generated by the Axioms ([L1-L16]{.sans-serif}), $\\Gamma$,\nand Modus Ponens.*\n:::\n\n::: theorem\n**Theorem 14** (Soundness Theorem). *For every set of formulas $\\Gamma$\nand formula $\\alpha$, if $\\Gamma \\vdash \\alpha$, then\n$\\Gamma \\models \\alpha$.*\n:::\n\n::: proof\n*Proof.* We proceed by induction on the length of the derivation of\n$\\alpha$ from $\\Gamma$.\n\n**Base case.** If the derivation has length $1$, then $\\alpha$ is either\na member of $\\Gamma$ or an instance of an axiom schema (L0--L16). In the\nfirst case, any model satisfying every formula in $\\Gamma$ satisfies\n$\\alpha$ immediately. In the second case, one verifies by direct\nsemantic inspection that every axiom schema is universally valid; for\ninstance, L0 holds because every interpretation makes\n$\\varphi\\lor\\neg\\varphi$ true, L10 holds because if\n$\\forall x\\,\\varphi(x)$ is true then $\\varphi[x\\mapsto t]$ is true for\nany admissibly substituted term $t$, and so on for the remaining\nschemas.[^1]\n\n**Inductive step.** Assume the claim holds for all derivations of length\nless than $n$, and suppose $\\alpha$ is obtained at step $n$ by Modus\nPonens from earlier lines $\\beta$ and $\\beta\\to\\alpha$. By the induction\nhypothesis, $\\Gamma\\models\\beta$ and $\\Gamma\\models(\\beta\\to\\alpha)$.\nLet $\\mathcal{M}$ be any model and $s$ any assignment satisfying every\nformula in $\\Gamma$. Then $\\mathcal{M},s\\models\\beta$ and\n$\\mathcal{M},s\\models\\beta\\to\\alpha$, so by the semantics of $\\to$ we\nget $\\mathcal{M},s\\models\\alpha$. Since $\\mathcal{M}$ and $s$ were\narbitrary, $\\Gamma\\models\\alpha$.\n\nBy induction, $\\Gamma\\vdash\\alpha$ implies $\\Gamma\\models\\alpha$.\u00a0\u25fb\n:::\n\nWell state the following theorems on formal proofs (without proofs):\n\n**1. Deduction Theorem:** For every $\\Gamma, \\alpha,\\beta$,\n$\\Gamma \\cup\\{\\alpha\\} \\vdash \\beta$ iff\n$\\Gamma \\vdash (\\alpha \\rightarrow \\beta)$.\n\n**2.** The following are equivalent:\n\n1.  There exists some $\\beta$ such that $\\Gamma \\not \\vdash \\beta$.\n\n2.  There is no $\\alpha$ such that $\\Gamma\\vdash \\alpha$ and\n    $\\Gamma \\vdash \\neg \\alpha$.\n\n3.  $\\Gamma$ is consistent\n\n::: theorem\n**Theorem 15** (Generalization Theorem). *If $\\Gamma \\vdash \\alpha$ and\n$x$ is not free in any formula in $\\Gamma$, then\n$\\Gamma \\vdash \\forall x \\alpha$.*\n:::\n\n::: proof\n*Proof.* If $x$ is not free in $\\alpha$, then\n$\\forall x\\,\\alpha \\leftrightarrow \\alpha$ semantically, and\n$\\Gamma\\vdash\\forall x\\,\\alpha$ follows trivially from\n$\\Gamma\\vdash\\alpha$.\n\nSince $\\Gamma \\vdash \\alpha$, pick any $\\psi \\in \\Gamma$. Because\n$x \\notin \\text{free}(\\psi)$, we can write the derivation as:\n\n   Step  Formula                                                   Justification\n  ------ --------------------------------------------------------- ------------------------------------------------\n    1    $\\alpha$                                                  Given, $\\Gamma\\vdash\\alpha$\n    2    $\\psi\\to\\alpha$                                           From (1) by L1\n    3    $\\forall x(\\psi\\to\\alpha)$                                From (2), $x\\notin\\mathrm{free}(\\psi)$, by L12\n    4    $\\forall x(\\psi\\to\\alpha)\\to(\\psi\\to\\forall x\\,\\alpha)$   L12\n    5    $\\psi\\to\\forall x\\,\\alpha$                                MP on (3) and (4)\n    6    $\\forall x\\,\\alpha$                                       MP on $\\psi$ and (5)\n\nFormally, since $\\Gamma\\vdash\\alpha$ and $x\\notin\\mathrm{free}(\\Gamma)$,\nthe rule encoded by L12 allows us to universally close $\\alpha$ over\n$x$, yielding $\\Gamma\\vdash\\forall x\\,\\alpha$.\u00a0\u25fb\n:::\n\nWe state the Completeness theorem without proof.\n\n::: theorem\n**Theorem 16** (Completeness). *If $\\Gamma \\models \\alpha$, then\n$\\Gamma \\vdash \\alpha$.*\n:::\n\n::: theorem\n**Theorem 17**. *$\\Gamma$ is consistent iff $\\Gamma$ is satisfiable.*\n:::\n\n::: proof\n*Proof.* $(\\Rightarrow)$ Assume $\\Gamma$ is consistent. Let no\n$\\mathcal M$ exists such that $\\mathcal M\\models \\Gamma$. Then\n$\\Gamma \\models \\beta$ for any $\\beta$. By completeness, it follows that\n$\\Gamma \\vdash \\beta$ for all $\\beta$, which contradicts the consistency\nof $\\Gamma$.\n\n$(\\Leftarrow)$ Let $\\Gamma$ be satisfiable. Then there exists\n$\\mathcal{M}$ such that $\\mathcal{M}\\models\\Gamma$. Suppose for\ncontradiction that $\\Gamma$ is inconsistent,\ni.e.\u00a0$\\Gamma\\vdash\\beta\\land\\neg\\beta$ for some $\\beta$. By soundness,\n$\\Gamma\\models\\beta\\land\\neg\\beta$. But then\n$\\mathcal{M}\\models\\beta\\land\\neg\\beta$, which is a contradiction since\nno interpretation can satisfy both $\\beta$ and $\\neg\\beta$\nsimultaneously. Hence $\\Gamma$ is consistent.\u00a0\u25fb\n:::\n\n# What We've Done So Far\n\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| **Syntax**                           | **Semantics**                                                    | **Bridging Theorems / Connections**                                        |\n+:=====================================+:=================================================================+:===========================================================================+\n| **Syntax**                           | **Semantics**                                                    | **Bridging Theorems / Connections**                                        |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| *Continued on next page...*                                                                                                                                                          |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n|                                      |                                                                  |                                                                            |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| Terms (variables, constants,         | Assignment function $s: V \\to M$ and its extension               | **Claim (Term Coincidence):** If $s_1, s_2$ agree on all free variables of |\n| function applications)               | $\\bar{s}: T \\to M$                                               | $t$, then $\\bar{s}_1(t) = \\bar{s}_2(t)$. Syntax (free variables)           |\n|                                      |                                                                  | determines which part of the assignment matters.                           |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| Well-formed formulas (wffs), built   | Satisfaction relation $\\mathcal{M} \\models_s \\varphi$, defined   | **Unique Decomposition Theorem:** Every wff has a unique syntactic         |\n| inductively from atomic formulas,    | inductively over structures and assignments                      | decomposition, ensuring $\\bar{s}$ is well-defined and the semantic         |\n| connectives, and quantifiers         |                                                                  | interpretation is unambiguous.                                             |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| Free variables                       | Truth value of $\\varphi$ in $\\mathcal{M}$ under assignment $s$   | **Coincidence Lemma:**                                                     |\n| $\\mathbf{F}(\\varphi)$, defined       |                                                                  | $\\mathcal{M} \\models_{s_1} \\varphi \\iff \\mathcal{M} \\models_{s_2} \\varphi$ |\n| syntactically by induction on        |                                                                  | whenever $s_1, s_2$ agree on $\\mathbf{F}(\\varphi)$. Only syntactically     |\n| $\\varphi$                            |                                                                  | free variables affe -----------------------+\n| *Expressive Power*                                                                                                                                                                   |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| Set of $\\mathcal{L}$-sentences       | Definable class of structures                                    | **Definability:** A class $K$ is definable iff there is a $\\Sigma$ whose   |\n| $\\Sigma$ (syntactic object)          | $K = \\{\\mathcal{M} : \\mathcal{M} \\models \\Sigma\\}$ (semantic     | models are exactly $K$. Compactness limits expressibility; e.g., finite    |\n|                                      | object)                                                          | structures and finite-diameter graphs are *not* definable.                 |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| A formula $\\varphi(x)$ with one free | Definable subset                                                 | **Definability within a structure:** Syntax (formulas with free variables) |\n| variable (syntactic)                 | $A = \\{a \\in M : \\mathcal{M} \\models_{s[x \\mapsto a]} \\varphi\\}$ | carves out semantic subsets of the domain.                                 |\n|                                      | of the domain (semantic)                                         |                                                                            |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n| *Quantifier Reasoning*               |                                                                  |                                                                            |\n+--------------------------------------+------------------------------------------------------------------+----------------------------------------------------------------------------+\n\n: The syntax--semantics correspondence in First-Order Logic, with\nbridging theorems.\n\n# G\u00f6del's Incompleteness Theorem \n\nThe Soundness and Completeness Theorems together establish that the\nproof system $\\Delta$ (axioms [L0]{.sans-serif}--[L16]{.sans-serif} with\nModus Ponens) is a *perfect* match for first-order logical consequence:\n$\\Gamma \\vdash \\varphi$ if and only if $\\Gamma \\models \\varphi$. One\nmight hope that for a specific, sufficiently rich theory $T$, such as\narithmetic, completeness means $T$ can decide every sentence, i.e., for\nevery sentence $\\varphi$, either $T \\vdash \\varphi$ or $T \\vdash \n\\neg\\varphi$. G\u00f6del's Incompleteness Theorems shatter this hope.\n\nHilbert, one of the greatest mathematicians of his time, attempted\nwhat's known as \\\"Hibert's Program\\\", which aimed to formalize the\nnotion of a valid mathematical proof. A proof should satisfy three\nrequirements:\n\n1.  **Soundness:** for every first-order statement on the natural\n    numbers $\\varphi$, if $\\vdash \\varphi$, then $\\varphi$ is a correct\n    statement.\n\n2.  **Completeness:** every true first-order statement $\\varphi$ on the\n    natural systems is provable.\n\n3.  **Verifiability:** there should be a clear formal method to check if\n    a given string of symbols is a valid proof.\n\nLooking at this requirements, it seems that FOL proof system is indeed\nverifiable, complete, and sound with respect to\n$\\{\\varphi: \\varphi \\text{ is a logical truth}\\}$. But note that this\nset is smaller than the set of first-order statements on the natural\nnumbers, i.e., there are statements that are true to the natural numbers\nbut fail under another structure.\n\nPeano Arithmetic is the standard proof system we use when working on\n$\\mathbb N$. This system satisfies Soundness and Verifiability. And it\nwas hoped that it would be complete. This is where Godel steps in.\n\n**Godel's Incompleteness:** For every proof system in number theory that\nis verifiable, there is a statement $\\varphi$ about numbers such that\n$\\not \\vdash \\varphi$ and $\\not \\vdash \\neg \\varphi$.\n\nThis statement holds for any rich enough mathematical object.\n\n## Background and Setup {#background-and-setup .unnumbered}\n\nRecall from the section on non-standard models the language of\narithmetic: $$\\mathcal{L} = \\{+, \\cdot, s, \\leq, 0, 1\\}$$ interpreted in\nthe standard model $\\mathcal{M} = (\\mathbb{N}, +, \\cdot,\ns, \\leq, 0, 1)$. We defined the **theory of arithmetic**:\n$$\\mathsf{Th}(\\mathcal{M}) = \\{\\varphi : \\varphi \\text{ is an \n}\\mathcal{L}\\text{-sentence and }\\mathcal{M} \\models \\varphi\\}.$$ We now\nwork with a weaker but more tractable theory. Let $\\mathsf{PA}$ (*Peano\nArithmetic*) denote a standard recursive axiomatisation of arithmetic.\nWe will not list all axioms of $\\mathsf{PA}$ here, but its key\nproperties are:\n\n- $\\mathsf{PA}$ is **consistent**: no sentence $\\varphi$ satisfies both\n  $\\mathsf{PA} \\vdash \\varphi$ and $\\mathsf{PA} \\vdash \n      \\neg\\varphi$. By our Consistency $\\iff$ Satisfiability theorem,\n  $\\mathsf{PA}$ has a model.\n\n- $\\mathsf{PA}$ is **recursively axiomatisable**: there is an algorithm\n  that decides whether any given sentence is an axiom of $\\mathsf{PA}$.\n\n- $\\mathsf{PA}$ is **sufficiently strong**: it can represent all\n  primitive recursive functions and relations, and in particular can\n  encode and reason about finite syntactic objects (formulas, proofs) as\n  natural numbers.\n\nThe third point is crucial and deserves elaboration.\n\n## G\u00f6del Numbering (Sketch) {#g\u00f6del-numbering-sketch .unnumbered}\n\nThe central technical idea is that every syntactic object in\n$\\mathcal{L}$ --- every symbol, term, formula, and finite sequence of\nformulas (i.e., proof) --- can be assigned a unique natural number\ncalled its **G\u00f6del number**, written $\\ulcorner \\varphi \\urcorner$. This\nencoding is entirely explicit and computable. Its key consequence is:\n\n- The property \"$n$ is the G\u00f6del number of a formula\" is decidable by\n  $\\mathsf{PA}$.\n\n- The property \"$n$ is the G\u00f6del number of a proof of the formula with\n  G\u00f6del number $m$\" is decidable by $\\mathsf{PA}$.\n\n- Consequently, the provability predicate\n  $\\mathsf{Prov}(m) \\equiv \\exists n\\, \\mathsf{Proof}(n, m)$ (\"there\n  exists a proof of the formula numbered $m$\") is expressible as an\n  $\\mathcal{L}$-formula.\n\nThis means that $\\mathsf{PA}$ can *talk about its own proofs* inside the\nobject language. We now have the tools to state and prove the main\nresults.\n\n## The Diagonal Lemma {#the-diagonal-lemma .unnumbered}\n\nThe following lemma is the engine behind both incompleteness theorems.\nIts proof uses the G\u00f6del numbering machinery in full.\n\n::: lemma\n**Lemma 7** (Diagonal Lemma). *Let $T$ be any consistent, recursively\naxiomatisable extension of $\\mathsf{PA}$, and let $\\psi(x)$ be any\n$\\mathcal{L}$-formula with one free variable. Then there exists a\nsentence $\\varphi$ such that:\n$$T \\vdash \\varphi \\leftrightarrow \\psi(\\ulcorner \\varphi \\urcorner).$$\nThat is, $\\varphi$ \"says of itself\" that it satisfies $\\psi$.*\n:::\n\n::: proof\n*Proof (Sketch).* Define the *substitution function*\n$\\mathsf{sub}(m, n)$ to be the G\u00f6del number of the formula obtained by\nsubstituting the numeral $\\bar{n}$ for the free variable in the formula\nnumbered $m$. This function is representable in $\\mathsf{PA}$.\n\nNow let $\\theta(x) \\equiv \\psi(\\mathsf{sub}(x, x))$, and set\n$k = \\ulcorner \\theta \\urcorner$. Define\n$\\varphi \\equiv \\theta(\\bar{k}) \\equiv \\psi(\\mathsf{sub}(\\bar{k}, \n    \\bar{k}))$. Then $\\mathsf{sub}(k, k) = \\ulcorner \\varphi \\urcorner$\nby construction, and $T \\vdash \\varphi \\leftrightarrow \n    \\psi(\\ulcorner \\varphi \\urcorner)$.\u00a0\u25fb\n:::\n\n## First Incompleteness Theorem {#first-incompleteness-theorem .unnumbered}\n\n::: theorem\n**Theorem 18** (G\u00f6del's First Incompleteness Theorem). *Let $T$ be a\nconsistent, recursively axiomatisable theory that extends $\\mathsf{PA}$.\nThen $T$ is **incomplete**: there exists a sentence $G$ such that\n$$T \\not\\vdash G \\quad \\text{and} \\quad T \\not\\vdash \\neg G.$$*\n:::\n\n::: proof\n*Proof.* Let $\\mathsf{Prov}_T(x)$ be the provability predicate for $T$,\ni.e., the $\\mathcal{L}$-formula expressing \"the formula with G\u00f6del\nnumber $x$ is provable in $T$\". Apply the Diagonal Lemma to\n$\\psi(x) \\equiv \\neg \\mathsf{Prov}_T(x)$ to obtain a sentence $G$ such\nthat: $$T \\vdash G \\leftrightarrow \\neg \\mathsf{Prov}_T(\\ulcorner G \n    \\urcorner). \\tag{$*$}$$ Informally, $G$ says: *\"I am not provable in\n$T$.\"*\n\nWe now show $T \\not\\vdash G$ and $T \\not\\vdash \\neg G$.\n\n**Case 1: $T \\not\\vdash G$.**\n\nSuppose for contradiction that $T \\vdash G$. Then\n$\\mathsf{Prov}_T(\\ulcorner G \\urcorner)$ is true (there genuinely exists\na proof), and since $T$ is sufficiently strong,\n$T \\vdash \\mathsf{Prov}_T(\\ulcorner G \\urcorner)$. But by $(*)$,\n$T \\vdash G \\leftrightarrow \\neg\\mathsf{Prov}_T(\\ulcorner G \n    \\urcorner)$, so $T \\vdash \\neg G$. This contradicts the consistency\nof $T$.\n\n**Case 2: $T \\not\\vdash \\neg G$.**\n\nSuppose for contradiction that $T \\vdash \\neg G$. By $(*)$,\n$T \\vdash \\mathsf{Prov}_T(\\ulcorner G \\urcorner)$, meaning $T$ proves\nthat $G$ is provable. But we showed in Case 1 that $G$ is in fact not\nprovable. So $T$ proves a false arithmetic statement about provability.\nMore precisely, $T \\vdash \n    \\mathsf{Prov}_T(\\ulcorner G \\urcorner)$, yet no proof of $G$ exists,\nso this sentence is false in $\\mathcal{M}$, meaning $T$ has no model in\nwhich $\\mathcal{M}$ is the standard natural numbers.[^2]\n\nTherefore, neither $G$ nor $\\neg G$ is provable in $T$, so $T$ is\nincomplete.\u00a0\u25fb\n:::\n\n**Remark:** The sentence $G$ is *true* in the standard model\n$\\mathcal{M}$: since $T \\not\\vdash G$, the statement \"$G$ is not\nprovable\" is correct. This shows that $\\mathsf{Th}(\\mathcal{M})$\nstrictly contains $T$ --- there are true arithmetic sentences that $T$\ncannot prove. Recall that we constructed a non-standard model\n$\\mathcal{N} \\models \\mathsf{Th}(\\mathcal{M})$ using Compactness; that\nmodel also satisfies $G$. Since $T \\not\\vdash G$, by Completeness there\nmust exist *some* model of $T$ in which $G$ fails --- and indeed,\nnon-standard models of $T$ alone (not of the full\n$\\mathsf{Th}(\\mathcal{M})$) can satisfy $\\neg G$.\n\n## Second Incompleteness Theorem {#second-incompleteness-theorem .unnumbered}\n\n::: theorem\n**Theorem 19** (G\u00f6del's Second Incompleteness Theorem). *Let $T$ be a\nconsistent, recursively axiomatisable extension of $\\mathsf{PA}$. Then:\n$$T \\not\\vdash \\mathsf{Con}(T),$$ where $\\mathsf{Con}(T)$ is the\n$\\mathcal{L}$-sentence asserting the consistency of $T$, i.e.,\n$\\neg \\mathsf{Prov}_T(\\ulcorner \\bot \\urcorner)$ for some fixed\ncontradiction $\\bot$.*\n:::\n\n::: proof\n*Proof (Sketch).* The key observation is that the argument of Case 1 in\nthe First Incompleteness Theorem can itself be formalised inside $T$.\nThat is, the reasoning\n$$\\text{``if } T \\vdash G \\text{ then } T \\text{ is inconsistent''}$$\ncan be carried out within $T$ to yield:\n$$T \\vdash \\mathsf{Con}(T) \\rightarrow G. \\tag{$**$}$$ This\nformalisation requires checking that the proof of Case 1 uses only facts\nabout provability that are themselves provable in $T$ --- this is the\ncontent of the *Hilbert-Bernays-L\u00f6b derivability conditions*, which\n$\\mathsf{PA}$ satisfies.\n\nNow suppose for contradiction that $T \\vdash \\mathsf{Con}(T)$. Then by\n$(**)$ and Modus Ponens, $T \\vdash G$. But this contradicts Case 1 of\nthe First Incompleteness Theorem (which showed $T \n    \\not\\vdash G$ under the assumption that $T$ is consistent).\nTherefore $T \\not\\vdash \\mathsf{Con}(T)$.\u00a0\u25fb\n:::\n\n**Remark:** The Second Incompleteness Theorem is the formal death of\nHilbert's Programme, which sought to prove the consistency of\nmathematics within mathematics itself. No sufficiently strong,\nconsistent, recursively axiomatisable theory can prove its own\nconsistency.\n\n## Relationship to Our Framework {#relationship-to-our-framework .unnumbered}\n\nThe incompleteness theorems do not contradict the Completeness Theorem\nproved earlier. The distinction is:\n\n- **G\u00f6del Completeness** (proved above) concerns the proof system for\n  *first-order logic*: every logically valid sentence\n  ($\\models \\varphi$) is provable ($\\vdash \\varphi$). This is a\n  statement about the *rules of inference*.\n\n- **G\u00f6del Incompleteness** concerns a specific *theory* $T$ (a set of\n  non-logical axioms such as $\\mathsf{PA}$): there are sentences\n  $\\varphi$ that are true in the intended model but which\n  $T \\not\\vdash \\varphi$.\n\nMore precisely, the incompleteness theorems assert that $T$ is not\n*semantically complete* in the sense that $T \\not\\models G$ is\nimpossible --- in fact $\\mathcal{M} \\models G$, but $G$ is not a logical\nconsequence of $T$ alone, so $T \\not\\vdash G$ by the Completeness\nTheorem (running it in the contrapositive). The following table\nsummarises the relationship:\n\n::: center\n  **Result**             **Concerns**          **Statement**\n  ---------------------- --------------------- -------------------------------------------------------\n  Soundness              Proof system          $\\Gamma \\vdash \\varphi \\Rightarrow \\Gamma \n                                               \\models \\varphi$\n  Completeness (G\u00f6del)   Proof system          $\\Gamma \\models \\varphi \n                                               \\Rightarrow \\Gamma \\vdash \\varphi$\n  1st Incompleteness     Arithmetic theories   $\\exists G: T \\not\\vdash G$ and $T \\not\\vdash \\neg G$\n  2nd Incompleteness     Arithmetic theories   $T \\not\\vdash \n                                               \\mathsf{Con}(T)$\n  Compactness            Both                  $\\Gamma$ sat.\u00a0$\\iff$ fin.\u00a0subsets sat.\n:::\n\n[^1]: Each axiom schema is a logical truth by direct semantic\n    inspection: L0 holds since every interpretation satisfies\n    $\\varphi\\lor\\neg\\varphi$; L1--L2 hold since the consequent is true\n    whenever the antecedent is; L3--L5 hold by the semantics of $\\land$;\n    L6--L8 hold by the semantics of $\\lor$; L9 holds since a false\n    formula implies anything; L10--L11 hold since\n    $\\forall x\\,\\varphi(x)$ implies $\\varphi[x\\mapsto t]$ and\n    $\\varphi[x\\mapsto t]$ implies $\\exists x\\,\\varphi(x)$ for any\n    admissible term $t$; L12--L13 hold since when\n    $x\\notin\\mathrm{free}(\\psi)$ the quantifier may be shifted past\n    $\\to$ without affecting the truth value of $\\psi$; and L14--L16 hold\n    since equality is interpreted as the identity relation, making\n    reflexivity, substitutivity for relations, and substitutivity for\n    functions all universally valid.\n\n[^2]: To conclude $T \\not\\vdash \\neg G$ without appealing to the\n    standard model, one assumes the stronger hypothesis that $T$ is\n    *$\\omega$-consistent*: $T$ does not prove $\\exists x\\, \\neg\\psi(x)$\n    when it proves $\\neg\\psi(\\bar{n})$ for every standard numeral\n    $\\bar{n}$. Under $\\omega$-consistency, the argument is purely\n    syntactic. Rosser's 1936 refinement removes even this assumption,\n    requiring only plain consistency.\n";
