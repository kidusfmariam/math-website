<script>
const markdown = "# Introduction\n\n*Logic focuses on how to reliably get from assumptions to conclusions.*\n\nWhether or not $F=ma$ is true is not the concern of the logician. What\nthey ask instead is *if $F=ma$, does it follow that $a=\\frac Fm$?* This\nquestion isn't limited to the given formula alone, i.e., it generalizes.\nAlthough logic may seem common sense at first glance, our common sense\noften run into problems (paradoxes).\n\n**Barber Paradox:** *In a town there is one barber. This barber shaves\npeople if and only if they don't shave themselves. The question is, does\nthe barber shave himself?*\n\nThe above is a simpler stating of Russell's famous paradox.\n\n**Russell's Paradox:** Let $R=\\{X: X\\text{ is a set and } X\\notin X\\}$.\nThe question is, is $R\\in R$? If so, the $R$ belongs to a set that don't\ncontain themselves. Therefore, $R\\notin R$. And if $R\\notin R$, then $R$\nis a set that doesn't contain itself, thus $R\\in R$. Hence, the paradox.\n\n**Berry's Paradox:** Let $B$ be the set of all natural numbers that can\nbe described by an english sentence of at most 200 characters. Is $B$\nfinite? It seems so since there are at most $26^{200}$ combinations of\ncharacters and each combination describes at most one number. Hence, $B$\nshould be finite. Consider *the first number that can not be described\nby an English sentence of at most 200 characters.* Since $B$ is finite,\nsuch a number exists. But the description we wrote for it is less than\n200 characters.\n\nThese paradoxes demonstrate the need for a formal, rigorous system of\nlogic. So our goal is to develop tools that'll help us move from\nassumption to conclusions.\n\nAs seen earlier, our natural languages are not fit for this task. We\nneed to construct and analyze formal languages. We will focus on two\nsuch languages: Propositional Logic $\\textsf{(PL)}$ and First Order\nLogic $\\textsf{(FOL)}$. Other types of logic, such as temporal logic,\nwill also be introduced.\n\nIn constructing languages, we must distinguish between two components:\n**Syntax** and **Semantics**. In short, syntax is concerned with\nstructure (form) and semantics is concerned with entailment (meaning).\n\nWhen defining the language of $\\textsf{PL}$ , we need to specify an\ninfinite set of valid strings, commonly called formulas. Because the set\nis infinite and its members do not share a single easily expressible\ncommon property, we cannot define it directly using set-builder\nnotation. Instead, we rely on an inductive definition.\n\nAn inductive definition of a set consists of:\n\n1.  A universe set $X$.\n\n2.  A core (base) set $B\\subseteq X$.\n\n3.  A finite set of operations, i.e., functions\n    $\\mathcal F=\\bigcup_{n\\in \\mathbb N} \\mathcal F_n$ where\n    $\\mathcal F_n$ consists of functions $f:A^n\\to A$.\n\n4.  The concept of closure, i.e., $A\\subseteq X$ is closed if for any\n    function $f$ with arity $k$ and elements $a_1,\\dots,a_k\\in A$,\n    $f(a_1,\\dots, a_k)\\in A$.\n\nA set defined inductively from $(X, B,\\mathcal F)$ is denoted\n$I(X,B,\\mathcal F)$ or simply $I$ when the context is clear. It is\ndefined as the smallest subset of $X$ that contains $B$ and is closed\nunder $\\mathcal F$. Let\n$\\mathcal C=\\{A: B\\subseteq A \\text{ and } A \\text{ is closed under} \\mathcal F\\}$\nLet $I$ be defined as follows: $$I=\\bigcap \\mathcal C$$\n\n::: proposition\n**Proposition 1**. *The following hold*\n\n*i) $B\\subseteq \\bigcap \\mathcal C$*\n\n*ii) $\\bigcap \\mathcal C$ is closed under $\\mathcal F$*\n\n*iii) $\\bigcap \\mathcal C$ is the minimal set satisfying (i) and (ii).*\n\n*iv) No other set can satisfy (i), (ii), and (iii) simultaneously.*\n:::\n\n::: proof\n*Proof.* i) Trivial.\n\nii\\) Let $x\\in \\bigcap \\mathcal C$ then $x\\in A$ for all $A$ closed\nunder $\\mathcal F$. Therefore, $f(a)\\in A$ for all $A$ and for all\n$f\\in \\mathcal F$. Hence, $f(a)\\in \\bigcap \\mathcal C$.\n\niii\\) Let $\\mathcal D$ be another set satisfying (i) and (ii). Then\n$\\mathcal D\\in \\mathcal C$. Thus,\n$\\bigcap \\mathcal C\\subseteq \\mathcal D$.\n\niv\\) Let $\\mathcal E$ and $\\bigcap \\mathcal C$ be two sets that satisfy\n(i), (ii), and (iii). By minimality, we have\n$\\mathcal{E\\subseteq \\bigcap C}$ and $\\mathcal{\\bigcap C\\subseteq E}$.\nHence, $\\mathcal{E=\\bigcap C}$.\u00a0\u25fb\n:::\n\n# The Language of Propositional Logic (PL)\n\nWe define our language as follows. We first fix a set of symbols. These\nsymbols are of two kinds:\n\n**1. Logical Symbols:** $$),(,\\neg,\\lor,\\land,\\rightarrow$$ **2.\nNon-logical (Variable) Symbols:** $$p_1,p_2,p_3,\\dots$$ Next, we build\nour set of expressions. An expression is a finite sequence of symbols.\nSome expressions can be pure nonsense, such as: $$((p_1\\rightarrow$$ We\nwant to define propositions or well-formed formulas (wffs) as\n\\\"grammatically correct\" expressions; the nonsensical expressions must\nbe excluded. We define them inductively as follows:\n\n1.  Every variable symbol is a proposition (wff).\n\n2.  If $\\alpha$ and $\\beta$ are wffs, then so are\n    $\\neg \\alpha, (\\alpha\\lor\\beta), (\\alpha \\land \\beta),$ and\n    $(\\alpha\\rightarrow \\beta)$.\n\n3.  No expression is a wff unless it is compelled to be one by (a) and\n    (b).\n\nTo determine whether a given expression is a well-formed formula (wff)\nin the language of $\\textsf{PL}$, we check whether it can be constructed\ninductively from the atomic formulas (propositional variables) using the\nformation rules. An ancestral tree (or formation tree) visualizes this\ninductive construction: the root is the full formula, internal nodes\ncorrespond to applications of connectives, and the leaves are atomic\npropositions. Consider the expression\n$$\\neg(((p_1\\lor p_2)\\rightarrow p_3)\\land (p_3\\lor\\neg p_4)).$$ The\nfollowing ancestral tree shows that it is indeed a well-formed formula,\nas it can be built step by step from the atomic formulas\n$p_1, p_2, p_3, p_4$:\n\nHence, our expression is a well-formed formula.\n\n::: theorem\n**Theorem 1**. *$\\alpha$ is a well-formed formula if and only if\n$\\alpha$ has a valid ancestral tree.*\n:::\n\n::: proof\n*Proof.* ($\\Rightarrow$) If $\\alpha$ is a well-formed formula, then by\nthe inductive definition of the set of wffs, it can be constructed from\natomic formulas by finitely many applications of the formation rules.\nThis construction corresponds exactly to a valid ancestral tree with\nroot $\\alpha$.\n\n($\\Leftarrow$) If $\\alpha$ has a valid ancestral tree, then the tree\nprovides a finite inductive construction of $\\alpha$ from atomic\nformulas using the formation rules. Hence $\\alpha$ belongs to the\nsmallest set containing the atomic formulas and closed under the\nformation rules, i.e., $\\alpha$ is a well-formed formula.\u00a0\u25fb\n:::\n\n:::: exercisebox\nShow that there are no wffs of length 2, 3, or 6, but that any other\npositive length is possible.\n\n::: proof\n*Proof.* We proceed with structural induction.\n\n**Base Case:** Let $\\alpha$ be a propositional variable, then\n$|\\alpha|=1$. Hence, the claim holds.\n\n**Inductive Step:** Let $\\alpha$ and $\\beta$ satisfy the claim. The\n$|(\\neg \\alpha)|=3+|\\alpha|$. Cases for $|(\\neg \\alpha)|=2$ and\n$|(\\neg \\alpha)|=3$ clearly fail. If $|(\\neg \\alpha)|=6$, then\n$|\\alpha|=3$, contradicting our inductive hypothesis. Thus our claim\nholds for $(\\neg \\alpha)$.\n\nNext, we have $|(\\alpha \\lor \\beta)|=3+|\\alpha|+|\\beta|$. Then cases for\n$|(\\alpha \\lor \\beta)|=2$ and $|(\\alpha \\lor \\beta)|=3$ clearly fail. If\n$|(\\alpha \\lor \\beta)|=6$, then $|\\alpha|+|\\beta|=3$. Which means one of\n$\\alpha$ or $\\beta$ has length $2$, contradicting our inductive\nhypothesis. Hence our claim holds for $|(\\alpha \\lor \\beta)|$. The\nproofs for the other connectives are analogous.\u00a0\u25fb\n:::\n::::\n\n:::: exercisebox\nLet $\\alpha$ be a wff; let $c$ be the number of places at which binary\nconnective symbols ($\\land, \\lor, \\to, \\leftrightarrow$) occur in\n$\\alpha$; let $s$ be the number of places at which sentence symbols\noccur in $\\alpha$. (For example, if $\\alpha$ is\n$(\\mathbf{A} \\to (\\neg \\mathbf{A}))$ then $c = 1$ and $s = 2$.) Show by\nusing the induction principle that $s = c + 1$.\n\n::: proof\n*Proof.* Again, we proceed by structural induction.\n\n**Base Case:** Let $\\alpha$ be a propositional variable. Then $c=0$ and\n$s=1$. Hence $s=c+1$ holds.\n\n**Inductive Step:** Let $\\alpha$ and $\\beta$ have our desired property.\nThen for $(\\neg \\alpha)$ nothing changes. By our inductive hypothesis\n$s_{(\\neg \\alpha)}=c_{(\\neg\\alpha)}+1$. For $(\\alpha \\lor \\beta)$, note\nthat $c_{(\\alpha \\lor \\beta)}=c_\\alpha+c_\\beta +1$. And we have\n$s_{(\\alpha\\lor \\beta)}=s_\\alpha+s_\\beta=(c_\\alpha +1)+(c_\\beta+1)=(c_\\alpha +c_\\beta+1)+1$.\nHence the property holds. The cases for the other connectives are\nanalogous.\u00a0\u25fb\n:::\n::::\n\n:::: exercisebox\nAssume we have a construction sequence ending in $\\varphi$, where\n$\\varphi$ does not contain the symbol $\\mathbf{A}_4$. Suppose we delete\nall the expressions in the construction sequence that contain\n$\\mathbf{A}_4$. Show that the result is still a legal construction\nsequence.\n\n::: proof\n*Proof.* Let $S=\\{\\alpha_1,\\dots, \\alpha_n\\}$ be a construction sequence\nsuch that $\\alpha_n=\\varphi$. Let $S'$ be the sequence obtained by\nremoving all $\\alpha_i$ containing $\\mathbf A_4$. Clearly,\n$\\varphi\\in S'$.\n\nWe now check that $S'$ is still a legal construction sequence. Take any\n$\\beta \\in S'$.\n\n- If $\\beta$ is a variable, it is trivially allowed.\n\n- If $\\beta = \\neg \\gamma$, then $\\gamma$ does not contain\n  $\\mathbf{A}_4$ (otherwise $\\beta$ would contain $\\mathbf{A}_4$) and\n  hence $\\gamma \\in S'$ appearing before $\\beta$.\n\n- If $\\beta = (\\gamma_1 \\ast \\gamma_2)$ for\n  $\\ast \\in \\{\\land, \\lor, \\rightarrow\\}$, then $\\gamma_1, \\gamma_2$ do\n  not contain $\\mathbf{A}_4$ and hence appear in $S'$ before $\\beta$.\n\nThus, all formulas in $S'$ satisfy the rules of a construction sequence.\nHence $S'$ is a legal construction sequence ending in $\\varphi$.\u00a0\u25fb\n:::\n::::\n\n:::: exercisebox\nSuppose that $\\alpha$ is a wff not containing the negation symbol\n$\\neg$.\n\n1.  Show that the length of $\\alpha$ (i.e., the number of symbols in the\n    string) is odd.\n\n2.  Show that more than a quarter of the symbols are sentence symbols.\n\n::: proof\n*Proof.* (Based on the suggestion given on the textbook, we show that\nthe length of $\\alpha$ is $4k+1$ and the number of sentence symbols is\n$k+1$.) We proceed by induction.\n\n**Base Case:** For a propositional variable $\\alpha$, $|\\alpha|=1$,\ni.e., $4k+1$ for $k=0$. (b) holds as well since the number of sentence\nsymbols is $1=k+1$.\n\n**Inductive Step:** Let $\\alpha$ and $\\beta$ satisfy the desired\nproperty. Then for $(\\alpha \\ast \\beta)$ where\n$\\ast\\in \\{\\land, \\lor, \\leftarrow\\}$,\n$|(\\alpha\\ast\\beta)|=3+|\\alpha|+|\\beta|=3+(4m+1)+(4n+1)=4(m+n+1)+1$ for\nsome $m, n\\in \\mathbb N^+$. As for the number of sentence symbols, see\nthat $(\\alpha \\ast \\beta)=(m+1)+(n+1)=(m+n+1)+1$. Set $k=m+n+1$, then\n$|(\\alpha \\ast \\beta)|=4k+1$ and the number of sentence symbols is\n$k+1$. Hence, both (a) and (b) hold.\u00a0\u25fb\n:::\n::::\n\n# Syntactic Properties of Propositional Formulas\n\n*Given any statement $p$, can we be able to show that it doesn't belong\nto the set of well-formed formulas?*\n\nA basic intuition that can help us solve this problem is: find a\nproperty (in this case a subset) $\\textsf{T}$ such that only the set of\nall well-formed formulas are contained in $\\textsf{T}$ but\n$p\\notin \\textsf{T}$. Hence we need a tool for showing that some\nproperty $\\textsf {T}$ holds for all wffs.\n\nConsider the following property: *every wff is either a propositional\nvariable or starts with a left-bracket.* We prove this by induction.\n\n::: proof\n*Proof.* **Base Case:** Every propositional variable is a wff, by\ndefinition.\n\n**Inductive Step:** If $\\alpha$ and $\\beta$ are propositional variables,\nthen clearly\n$(\\neg \\alpha), (\\alpha \\land \\beta), (\\alpha \\lor \\beta), (\\alpha\\rightarrow \\beta)$\nstart with a left bracket.\u00a0\u25fb\n:::\n\nThen our set $\\textsf{T}$ consists of those expressions that are either\na propositional variable or start with a left bracket. Clearly, the set\nof well-formed formulas is contained in $\\textsf{T}$. From this we get a\nprinciple.\n\n**The generalized induction principle:** *If a property satisfied by all\nmembers of $B$ and if it is closed under $\\mathcal F$, then every member\nof $I(X,B,\\mathcal F)$ holds that property.*\n\nWe can now use this to prove multiple properties of the set of wffs. For\nexample, we can show that in any wff, the number of left and right\nbrackets are balanced (try the proof).\n\nNext, we define the proper initial segment of a wff. Let\n$\\varphi = s_1 s_2 \\dots s_n$ be a well-formed formula (wff), viewed as\na finite sequence of symbols. A *proper initial segment* of $\\varphi$ is\nany sequence of the form $$s_1 s_2 \\dots s_k$$ where $1 \\le k < n$.\n\n**Claim:** If $\\alpha$ is a wff and $\\gamma$ is an initial segment of\n$\\alpha$, then the number of right brackets in $\\gamma$ is strictly less\nthat the number of left brackets in $\\gamma$.\n\n::: proof\n*Proof.* We use structural induction.\n\n**Base Case:** Let $\\alpha$ be an atomic formula, then our statement is\nvacuously true since $\\alpha$ has no initial segment.\n\n**Inductive Step:** Let $\\alpha$ and $\\beta$ have the property. it\nsuffices to show that $(\\alpha\\lor \\beta)$ also has the property. We\nproceed by cases.\n\nCase 1: $\\gamma=($ , clearly the property holds.\n\nCase 2: $\\gamma=(\\gamma'$ where $\\gamma'$ is an initial segment of\n$\\alpha$. By our inductive hypothesis, the property holds.\n\nCase 3: $\\gamma=(\\alpha$. Then $\\alpha$ has balanced right and left\nbracket. Adding one left bracket ensures that the property holds.\n\nCase 4: $\\gamma=(\\alpha \\lor \\gamma''$ where $\\gamma''$ is an initial\nsegment of $\\beta$. By our inductive hypothesis, the property holds.\n\nCase 5: $\\gamma=(\\alpha\\lor \\beta$ . Then $\\alpha$ and $\\beta$ have\nbalanced right and left bracket. Adding one left bracket ensures that\nthe property holds.\n\nHence, by induction, for any initial segment of $(\\alpha \\lor \\beta)$,\nthen the number of right brackets is strictly less that the number of\nleft brackets.\u00a0\u25fb\n:::\n\n# The Semantics of Propositional Logic\n\nThe semantics of propositional logic rests on two truth values\n$\\{T, F\\}$.\n\n**Truth Assignment:** A truth assignment is a function $V: S\\to \\{T,F\\}$\nwhere $S$ is the set of propositional variables.\n\nWe define how to extend such an assignment to assign truth values to\nevery propositional formula over $S$. Here we define\n$\\bar V: \\mathrm{Form}\\to \\{T,F\\}$ by four fixed truth tables, each for\n$\\neg, \\lor, \\land, \\rightarrow$.\n\n$$\\begin{array}{c|c||c|c|c|c}\n\\varphi & \\psi & \\neg \\varphi & \\varphi \\land \\psi & \\varphi \\lor \\psi & \\varphi \\rightarrow \\psi \\\\ \\hline\nT & T & F & T & T & T \\\\\nT & F & F & F & T & F \\\\\nF & T & T & F & T & T \\\\\nF & F & T & F & F & T\n\\end{array}$$ Formally we define $\\bar V$ recursively:\n\n1.  If $\\varphi$ is an atomic formula, $\\bar V(\\varphi)=V(\\varphi)$.\n\n2.  If $\\varphi=\\neg \\psi$ for some formula $\\psi$ then\n    $$\\bar V(\\varphi)=\\begin{cases}\n            F, \\text{ if } V(\\psi)=T\\\\ T, \\text{ otherwise}\\\\\n            \n        \\end{cases}$$\n\n3.  If $\\varphi = (\\psi \\land \\chi)$ for some formulas $\\psi, \\chi$,\n    then $$\\bar V(\\varphi)=\n        \\begin{cases}\n            T, & \\text{if } \\bar V(\\psi)=T \\text{ and } \\bar V(\\chi)=T,\\\\\n            F, & \\text{otherwise.}\n        \\end{cases}$$\n\n4.  If $\\varphi = (\\psi \\lor \\chi)$ for some formulas $\\psi, \\chi$, then\n    $$\\bar V(\\varphi)=\n        \\begin{cases}\n            T, & \\text{if } \\bar V(\\psi)=T \\text{ or } \\bar V(\\chi)=T,\\\\\n            F, & \\text{otherwise.}\n        \\end{cases}$$\n\n5.  If $\\varphi = (\\psi \\rightarrow \\chi)$ for some formulas\n    $\\psi, \\chi$, then $$\\bar V(\\varphi)=\n        \\begin{cases}\n            F, & \\text{if } \\bar V(\\psi)=T \\text{ and } \\bar V(\\chi)=F,\\\\\n            T, & \\text{otherwise.}\n        \\end{cases}$$\n\nBut why is $\\bar V$ well-defined?\n\n::: lemma\n**Lemma 1**. *For every wff $\\alpha$, one and only one of the following\nstatements hold:*\n\n1.  *$\\alpha$ is a propositional variable*\n\n2.  *$\\alpha=(\\neg \\beta)$ for some wff $\\beta$*\n\n3.  *$\\alpha=(\\beta\\lor \\gamma)$ for wffs $\\beta$ and $\\gamma$*\n\n4.  *$\\alpha=(\\beta\\land \\gamma)$ for wffs $\\beta$ and $\\gamma$*\n\n5.  *$\\alpha=(\\beta\\rightarrow \\gamma)$ for wffs $\\beta$ and $\\gamma$*\n:::\n\n::: proof\n*Proof.* We prove both existence and uniqueness by induction on the\n*length* of the wff $\\alpha$.\n\n**Existence:** By definition, wffs are built recursively:\n\n- Any propositional variable is a wff.\n\n- If $\\beta$ and $\\gamma$ are wffs, then\n  $(\\neg \\beta), (\\beta \\lor \\gamma), (\\beta \\land \\gamma), (\\beta \\rightarrow \\gamma)$\n  are wffs.\n\nHence every wff falls into one of the five cases above.\n\n**Uniqueness:** Assume $\\alpha$ admits two decompositions:\n$$\\alpha = (\\text{some decomposition using one connective}) = (\\text{another decomposition using possibly another connective}).$$\nWe argue by induction on the length $|\\alpha|$:\n\n- If $\\alpha$ is atomic, there is nothing to prove; the decomposition is\n  trivially unique.\n\n- If $\\alpha$ is non-atomic, it begins with a left parenthesis $($ and\n  ends with a right parenthesis $)$. Scan $\\alpha$ from left to right:\n\n  - Count left and right parentheses. The *outermost connective* occurs\n    at the unique position where the number of left and right\n    parentheses balances after the first symbol.\n\n  - This identifies the main connective (either\n    $\\neg, \\lor, \\land, \\rightarrow$) and uniquely splits $\\alpha$ into\n    immediate subformula(s) $\\beta$ and possibly $\\gamma$.\n\n  By the induction hypothesis, these subformulas themselves have unique\n  decompositions. Therefore, the decomposition of $\\alpha$ is unique.\n\nHence, for every wff $\\alpha$, exactly one of the five forms holds and\nthe subformulas are uniquely determined.\u00a0\u25fb\n:::\n\n::: theorem\n**Theorem 2**. *For every truth assignment $V$ and every wff $\\alpha$,\nthere is only one value for $\\bar V(\\alpha)$ that is consistent with our\ndefinition of $\\bar V$.*\n:::\n\n::: proof\n*Proof.* We proceed by induction.\n\n**Base Case:** If $\\alpha$ is a propositional variable, then\n$\\bar V(\\alpha)=V(\\alpha)$ hence unique.\n\n**Inductive Step:** Let $\\alpha=(\\beta \\lor \\gamma)$. By the previous\nlemma, there is no other way to write $\\alpha$. Hence $\\bar V(\\alpha)$\nis unique since both $\\bar V(\\beta)$ and $\\bar V(\\gamma)$ are unique\n(inductive hypothesis).\u00a0\u25fb\n:::\n\nSome basic semantic notions:\n\n- $\\alpha$ is satisfiable if there exists some truth assignment $V$,\n  such that $\\bar V(\\alpha)=T$.\n\n- $\\alpha$ is a tautology if for every truth assignment $V$,\n  $\\bar V(\\alpha)=T$.\n\n- $\\alpha$ is a contradiction if for every truth assignment $V$,\n  $\\bar V(\\alpha)=F$.\n\nThe above notions involve only a single formula. The following will\ninvolve multiple formulas:\n\n- $\\alpha$ logically implies $\\beta$ (written $\\alpha \\models \\beta$)\n  if, for every truth assignment $V$, if $\\bar V(\\alpha)=T$ then also\n  $\\bar V(\\beta)=T$.\n\n- $\\alpha$ and $\\beta$ are logically equivalent if they logically imply\n  each other.\n\nNext, we discuss semantic notions on sets of formulas. Let $\\Sigma$\ndenote a set of propositional formulas.\n\n- $\\Sigma$ is satisfiable if there exists a truth assignment $V$ such\n  that for every $\\alpha \\in \\Sigma$, $\\bar V(\\alpha)=T$.\n\n- $\\Sigma$ logically implies $\\alpha$ (written $\\Sigma \\models \\alpha$)\n  if for every truth assignment $V$ and for all $\\beta\\in \\Sigma$, if\n  $\\bar V(\\beta)=T$ then $\\bar V(\\alpha)=T$.\n\n**Claim:** If $\\Sigma$ contains a contradiction, then for every formula\n$\\alpha$, $\\Sigma$ logically implies $\\alpha$.\n\n::: proof\n*Proof.* Vacuously true.\u00a0\u25fb\n:::\n\nThe key idea here is that if we start by assuming a contradiction, then\nwe can imply whatever we want. Bertrand Russel's famous proof that\n$2+2=5$ implies that he is the pope is a good example for this.\n\nOur definition of propositional logic was based on the connectives\n$\\langle \\neg, \\lor, \\land, \\rightarrow\\rangle$. But how general does it\nmake our logic? Could we have chosen better connectives?\n\nA **truth functional** is a function $f:\\{T,F\\}^n\\to \\{T,F\\}$ for some\n$n$. Each of our four truth tables therefore is a truth functional. But\nwe can think of truth functional that don't directly map to our four\nconnectives. Consider the connective $\\mathrm{NAND} (\\uparrow)$. We can\nalso consider the function $\\mathrm{Maj}_n$ where for every odd number\n$n$, it returns the majority truth value. So, our logical connectives\nare a part of larger set of truth functionals.\n\n::: definition\n**Definition 1**. *A set of truth functionals is called adequate if\npropositional formulas over that set can express every possible truth\nfunctional.*\n:::\n\n::: theorem\n**Theorem 3**. *The set $\\{\\neg, \\land, \\lor, \\rightarrow\\}$ is\nadequate.*\n:::\n\n::: proof\n*Proof.* Let $f$ be any truth function of $n$ variables $p_1,\\dots,p_n$.\nConsider its truth table. For each row $i$ in which $f$ takes the value\n$\\mathbf{T}$, define a monomial $\\alpha_i$ as follows:\n$$\\alpha_i = \\bigwedge_{j=1}^n \\beta_{ij},$$ where $$\\beta_{ij} =\n\\begin{cases}\np_j & \\text{if } p_j \\text{ is } \\mathbf{T} \\text{ in row } i,\\\\\n\\neg p_j & \\text{if } p_j \\text{ is } \\mathbf{F} \\text{ in row } i.\n\\end{cases}$$\n\nEach $\\alpha_i$ is true exactly on row $i$ and false on all other rows.\nNow define $$\\varphi = \\bigvee_{i:\\, f(i)=\\mathbf{T}} \\alpha_i.$$\n\nThen $\\varphi$ is true exactly on those rows where $f$ is true, and\nfalse otherwise. Hence $\\varphi$ expresses $f$.\n\nSince $\\varphi$ is built using only $\\neg$, $\\land$, and $\\lor$, and\n$\\rightarrow$ can be defined from these, it follows that every truth\nfunction is expressible using $\\{\\neg, \\land, \\lor, \\rightarrow\\}$.\nTherefore, this set is adequate.\u00a0\u25fb\n:::\n\nThere are different ways of showing whether a set of logical symbols are\nadequate or not.\n\n**Claim:** The set $\\{\\land, \\lor, \\rightarrow\\}$ is not adequate.\n\n::: proof\n*Proof.* Let $V_T$ be the valuation assigning $\\mathbf{T}$ to every\npropositional variable. We show by structural induction that for every\nformula $\\varphi$ built from $\\{\\land, \\lor, \\rightarrow\\}$,\n$$V_T(\\varphi) = \\mathbf{T}.$$\n\n**Base Case:** If $\\varphi$ is a propositional variable, then\n$V_T(\\varphi)=\\mathbf{T}$ by definition of $V_T$.\n\n**Inductive Step:** Suppose $V_T(\\alpha)=\\mathbf{T}$ and\n$V_T(\\beta)=\\mathbf{T}$. Then\n$$V_T(\\alpha \\land \\beta)=\\mathbf{T}, \\quad\nV_T(\\alpha \\lor \\beta)=\\mathbf{T}, \\quad\nV_T(\\alpha \\rightarrow \\beta)=\\mathbf{T}.$$ Thus the property is\npreserved under all connectives in $\\{\\land, \\lor, \\rightarrow\\}$.\n\nHence every formula $\\varphi$ in this language satisfies\n$V_T(\\varphi)=\\mathbf{T}$.\n\nNow consider a truth function $f$ such that\n$f(\\mathbf{T},\\dots,\\mathbf{T})=\\mathbf{F}$. No formula built from\n$\\{\\land, \\lor, \\rightarrow\\}$ can express $f$, since all such formulas\nevaluate to $\\mathbf{T}$ under $V_T$.\n\nTherefore, $\\{\\land, \\lor, \\rightarrow\\}$ is not adequate.\u00a0\u25fb\n:::\n\n**Claim:** The set $\\{\\neg, \\lor\\}$ is adequate.\n\n::: proof\n*Proof.* We show that $\\land$ can be defined using only $\\neg$ and\n$\\lor$. By De Morgan's law,\n$$\\alpha \\land \\beta \\equiv \\neg(\\neg \\alpha \\lor \\neg \\beta).$$ Thus\nevery occurrence of $\\land$ can be eliminated in favor of $\\neg$ and\n$\\lor$.\n\nSince $\\{\\neg, \\land, \\lor\\}$ is adequate, it follows that every truth\nfunction can be expressed using only $\\neg$ and $\\lor$. Hence\n$\\{\\neg, \\lor\\}$ is adequate.\u00a0\u25fb\n:::\n\nFurther semantic notions on sets of propositions $\\Sigma$:\n\n- $\\Sigma$ is complete if for every propositional formula $\\varphi$,\n  $\\Sigma \\models \\varphi$ or $\\Sigma \\models \\neg \\varphi$.\n\n- $\\Sigma$ is both complete and satisfiable if for every propositional\n  formula $\\varphi$, $\\Sigma \\models \\varphi$ or\n  $\\Sigma \\models \\neg \\varphi$ but not both.\n\n- $\\Sigma$ is maximally satisfiable if $\\Sigma$ is satisfiable and for\n  every $\\varphi$, if $\\Sigma \\not \\models \\varphi$\n  ($\\varphi\\notin \\Sigma$), then $\\Sigma \\cup \\{\\varphi\\}$ is not\n  satisfiable.\n\n::: theorem\n**Theorem 4**. *For every set of propositional formulas $\\Sigma$, tfae:*\n\n1.  *$\\Sigma$ is complete and satisfiable.*\n\n2.  *$\\Sigma$ is maximally satisfiable.*\n:::\n\n::: proof\n*Proof.* $(1\\rightarrow 2)$ Let $\\Sigma$ be complete and satisfiable.\nGiven $\\varphi$, if $\\Sigma \\not \\models \\varphi$, by completeness, we\nhave $\\Sigma \\models \\neg \\varphi$. Therefore, $\\Sigma \\cup \\{\\varphi\\}$\nis not satisfiable. Hence $\\Sigma$ is maximally satisfiable.\n\n$(2\\rightarrow 1)$ Let $\\Sigma$ be maximally satisfiable. Then if\n$\\Sigma\\not\\models \\varphi$, then $\\Sigma \\cup\\{\\varphi\\}$ is not\nsatisfiable. Hence $\\Sigma \\models \\neg \\varphi$.\u00a0\u25fb\n:::\n\n**Claim:** $\\Sigma$ is maximally satisfiable if and only if there is\nexactly one $V$ that satisfies all formulas in $\\Sigma$.\n\n::: proof\n*Proof.* $(\\rightarrow)$ Let $\\Sigma$ be maximally satisfiable. Then\nclearly there exists at least one $V$ that satisfies $\\Sigma$. We must\nnow show that $V$ is unique. Let $V$ and $V'$ be two assignments that\nsatisfy $\\Sigma$. If they are different, then there exists a\npropositional variable $p$ such that $V(p)=T$ and $V'(p)=F$. Since\n$V'(p)=F$, $\\Sigma\\cup\\{\\neg p\\}$ is satisfiable. But since $V(p)=T$,\n$\\Sigma \\cup \\{\\neg p\\}$ is unsatisfiable. Hence, a contradiction.\n\n$(\\leftarrow)$ Let $V$ be the unique truth assignment that satisfies all\nformulas in $\\Sigma$. Then clearly, if $\\Sigma \\not \\models \\alpha$ then\n$\\Sigma \\cup\\{\\alpha\\}$ is not satisfiable since $V$ is the only\nassignment that satisfies $\\Sigma$ and $\\alpha$ is not satisfied by $V$.\nHence, $\\Sigma$ is maximally satisfiable.\u00a0\u25fb\n:::\n\n::: exercisebox\n\\(a\\) Is $(((P \\to Q) \\to P) \\to P)$ a tautology?\n\n\\(b\\) Define $\\sigma_k$ recursively as follows: $\\sigma_0 = (P \\to Q)$\nand $\\sigma_{k+1} = (\\sigma_k \\to P)$. For which values of $k$ is\n$\\sigma_k$ a tautology? (Part (a) corresponds to $k = 2$.)\n\n**Solution:**\n\n\\(a\\) Let $\\varphi=(((P \\to Q) \\to P) \\to P)$. Assume $\\varphi$ is not a\ntautology. Then $\\varphi=F$ only when $P=F$. Regardless of what value we\nassign $Q$, we see that $\\varphi$ evaluates to true. Hence, a\ncontradiction. Thus, $\\varphi$ is a tautology.\n\n\\(b\\) Assuming $k\\in \\mathbb N\\setminus \\{0\\}$, then we can see that\n$\\sigma_k$ is a tautology whenever $k$ is even.\n:::\n\n::: exercisebox\nShow that the following hold:\n\n\\(a\\) $\\Sigma; \\alpha \\models \\beta$ iff\n$\\Sigma \\models (\\alpha \\to \\beta)$.\n\n\\(b\\) $\\bigl((\\alpha \\models \\beta) \\land (\\beta \\models \\alpha)\\bigr)$\niff $\\models (\\alpha \\leftrightarrow \\beta)$.\n\n(Recall that $\\Sigma; \\alpha = \\Sigma \\cup \\{\\alpha\\}$, the set together\nwith the one possibly new member $\\alpha$.)\n\n**Solution:**\n\n\\(a\\) $(\\Rightarrow)$ Let $\\Sigma;\\alpha\\models \\beta$. Then for any\ntruth assignment $V$, if $V(\\Sigma)=T$ and $\\bar V(\\alpha)=T$, then\n$\\bar V(\\beta)=T$. Thus, whenever $V(\\Sigma)=T$, then\n$V((\\alpha\\rightarrow \\beta))=T$ as well. Hence,\n$\\Sigma\\models (\\alpha \\rightarrow \\beta)$.\n\n$(\\Leftarrow)$ Let $\\Sigma \\models(\\alpha\\rightarrow \\beta)$. For\n$V(\\Sigma)=T$, we have $V((\\alpha \\rightarrow \\beta))=T$. Therefore,\nwhenever $V(\\alpha)=T$, $V(\\beta)=T$ as well. Hence,\n$\\Sigma;\\alpha\\models \\beta$ holds.\n\n\\(b\\) $(\\Rightarrow)$ Let\n$((\\alpha \\models \\beta)\\land (\\beta \\models \\alpha))$. Then this\nbasically telling us that $\\alpha$ and $\\beta$ have the same truth value\nunder any evaluation. Therefore, $(\\alpha \\leftrightarrow\\beta)$ is a\ntautology. Hence, $\\models (\\alpha \\leftrightarrow\\beta)$ holds.\n\n$(\\Leftarrow)$ If $(\\alpha \\leftrightarrow \\beta)$ is a tautology, then\n$\\alpha$ and $\\beta$ have the same truth value under any evaluation $V$.\nHence $((\\alpha \\models \\beta)\\land (\\beta \\models \\alpha))$ holds.\n:::\n\n::: exercisebox\nProve or refute each of the following assertions:\n\n\\(a\\) If either $\\Sigma \\models \\alpha$ or $\\Sigma \\models \\beta$, then\n$\\Sigma \\models (\\alpha \\lor \\beta)$.\n\n\\(b\\) If $\\Sigma \\models (\\alpha \\lor \\beta)$, then either\n$\\Sigma \\models \\alpha$ or $\\Sigma \\models \\beta$.\n\n**Solution:**\n\n\\(a\\) If $\\Sigma \\models \\alpha$ or $\\Sigma \\models \\beta$ then for any\ntruth assignment $V$ that is true for $\\Sigma$, either $V(\\alpha)=T$ or\n$V(\\beta)=T$. Hence $V((\\alpha \\lor \\beta))=T$. Thus,\n$\\Sigma\\models (\\alpha \\lor \\beta)$.\n\n\\(b\\) The converse doesn't hold. As a counter example, we know that\n$\\models (\\alpha \\lor (\\neg \\alpha))$. But, neither $\\models \\alpha$ nor\n$\\models (\\neg \\alpha)$ need not hold.\n:::\n\n::: exercisebox\n\\(a\\) Show that if $v_1$ and $v_2$ are truth assignments which agree on\nall the sentence symbols in the wff $\\alpha$, then\n$\\overline{v}_1(\\alpha) = \\overline{v}_2(\\alpha)$. Use the induction\nprinciple.\n\n\\(b\\) Let $S$ be a set of sentence symbols that includes those in\n$\\Sigma$ and $\\tau$ (and possibly more). Show that $\\Sigma \\models \\tau$\niff every truth assignment for $S$ which satisfies every member of\n$\\Sigma$ also satisfies $\\tau$. (This is an easy consequence of part\n(a). The point of part (b) is that we do not need to worry about getting\nthe domain of a truth assignment exactly perfect, as long as it is big\nenough. For example, one option would be always to use truth assignments\non the set of all sentence symbols. The drawback is that these are\ninfinite objects, and there are a great many --- uncountably many --- of\nthem.)\n\n**Solution:**\n\n\\(a\\) We proceed by structural induction on $\\alpha$.\n\n**Base Case:** Let $\\alpha = p$ be a propositional variable. Since $v_1$\nand $v_2$ agree on all sentence symbols in $\\alpha$, we have\n$$\\bar v_1(p) = v_1(p) = v_2(p) = \\bar v_2(p).$$\n\n**Inductive Step:**\n\n*Case 1:* $\\alpha = \\neg \\psi$. All sentence symbols of $\\psi$ occur in\n$\\alpha$, so $v_1$ and $v_2$ agree on them. By the inductive hypothesis,\n$$\\bar v_1(\\psi) = \\bar v_2(\\psi).$$ Hence,\n$$\\bar v_1(\\neg \\psi) = \\neg \\bar v_1(\\psi) = \\neg \\bar v_2(\\psi) = \\bar v_2(\\neg \\psi).$$\n\n*Case 2:* $\\alpha = (\\psi \\lor \\phi)$. All sentence symbols of $\\psi$\nand $\\phi$ occur in $\\alpha$, so $v_1$ and $v_2$ agree on them. By the\ninductive hypothesis,\n$$\\bar v_1(\\psi) = \\bar v_2(\\psi), \\quad \\bar v_1(\\phi) = \\bar v_2(\\phi).$$\nThus, $$\\bar v_1(\\psi \\lor \\phi)\n= \\bar v_1(\\psi) \\lor \\bar v_1(\\phi)\n= \\bar v_2(\\psi) \\lor \\bar v_2(\\phi)\n= \\bar v_2(\\psi \\lor \\phi).$$\n\nTherefore, $\\bar v_1(\\alpha) = \\bar v_2(\\alpha)$ for all $\\alpha$.\n\n\\(b\\) $(\\Rightarrow)$ Suppose $\\Sigma \\models \\tau$. Let $v$ be any\ntruth assignment on $S$ such that $v(\\Sigma)=T$. Let $v'$ be the\nrestriction of $v$ to the sentence symbols occurring in\n$\\Sigma \\cup \\{\\tau\\}$. Then $v'$ is a truth assignment (on a smaller\nset) with $v'(\\Sigma)=T$. Since $\\Sigma \\models \\tau$, we have\n$\\bar v'(\\tau)=T$.\n\nBy part (a), $v$ and $v'$ agree on all sentence symbols in $\\tau$, hence\n$$\\bar v(\\tau) = \\bar v'(\\tau) = T.$$ Thus, every truth assignment on\n$S$ that satisfies $\\Sigma$ also satisfies $\\tau$.\n\n$(\\Leftarrow)$ Suppose every truth assignment on $S$ that satisfies\n$\\Sigma$ also satisfies $\\tau$. Let $v$ be any truth assignment (on the\nsentence symbols of $\\Sigma \\cup \\{\\tau\\}$) such that $v(\\Sigma)=T$.\nExtend $v$ to a truth assignment $w$ on $S$ arbitrarily. Then\n$w(\\Sigma)=T$, so by assumption $w(\\tau)=T$.\n\nBy part (a), since $v$ and $w$ agree on all sentence symbols in $\\tau$,\nwe have $$\\bar v(\\tau) = \\bar w(\\tau) = T.$$ Hence,\n$\\Sigma \\models \\tau$.\n:::\n\n# Compactness Theorem\n\n**Fact:** $\\Sigma\\models \\alpha$ if and only if\n$\\Sigma \\cup \\{\\neg \\alpha\\}$ is not satisfiable.\n\n::: theorem\n**Theorem 5** (Finite Models). *For any $\\Sigma \\models \\alpha$, there\nexists $\\Sigma_0\\subseteq \\Sigma$ where $\\Sigma_0$ is finite, such that\n$\\Sigma_0\\models \\alpha$.*\n:::\n\n**Intuition:** Look at the truth table for $\\alpha$. If $\\alpha$ has $n$\npropositional variables, then the truth table will have $2^n$ rows.\nWe'll be focusing on those rows where $\\alpha$ is false. Let $V_i$ be\nthe $i$-th truth assignment for the false rows. Consider $\\Sigma$ under\n$V_i$. Because $\\Sigma \\models \\alpha$, we know that there exists some\n$\\beta_i\\in \\Sigma$ such that $V_i(\\beta_i)=F$. Define\n$\\Sigma_0=\\{\\beta_i: \\text{ for all }i\\}$. We now claim that\n$\\Sigma_0\\models \\alpha$. It suffices to show that\n$\\Sigma_0\\cup\\{\\neg \\alpha\\}$ is not satisfiable. Assume, for\ncontradiction, that it is. Hence, there exists a truth assignment $V$\nthat satisfies it, i.e $V(\\neg \\alpha)=T$ and $V(\\alpha)=F$. Hence,\nthere exists an $i$ such that $V_i=V$. But since $V$ satisfies\n$\\Sigma_0$, $V(\\beta_i)=T$ for all $\\beta_i\\in \\Sigma_0$. This is\nclearly a contradiction. Hence, $\\Sigma_0 \\cup\\{\\neg \\alpha\\}$ is not\nsatisfiable. Therefore, $\\Sigma_0\\models \\alpha$.\n\n::: proof\n*Proof.* Let $\\alpha$ have $n$ propositional variables, and consider all\n$2^n$ truth assignments. Focus on those assignments $V_1, \\dots, V_k$\nunder which $\\alpha$ is false.\n\nSince $\\Sigma \\models \\alpha$, each $V_i$ fails to satisfy $\\Sigma$.\nHence, for each $i$ there exists $\\beta_i \\in \\Sigma$ such that\n$V_i(\\beta_i) = F$. Let $$\\Sigma_0 := \\{\\beta_1, \\dots, \\beta_k\\}.$$\nThen $\\Sigma_0$ is finite.\n\nWe claim that $\\Sigma_0 \\models \\alpha$. It suffices to show that\n$\\Sigma_0 \\cup \\{\\neg \\alpha\\}$ is unsatisfiable. Suppose, for\ncontradiction, that there exists a valuation $V$ such that\n$$V \\models \\Sigma_0 \\cup \\{\\neg \\alpha\\}.$$ Then $V(\\alpha) = F$, so\n$V = V_i$ for some $i$. But $V \\models \\Sigma_0$ implies\n$V(\\beta_i) = T$, contradicting $V_i(\\beta_i) = F$.\n\nTherefore, $\\Sigma_0 \\cup \\{\\neg \\alpha\\}$ is unsatisfiable, and hence\n$\\Sigma_0 \\models \\alpha$.\u00a0\u25fb\n:::\n\n::: definition\n**Definition 2**. *$\\Sigma$ is finitely satisfiable (fs) if and only if\nfor all finite $\\Sigma_0$ such that $\\Sigma_0\\subseteq \\Sigma$,\n$\\Sigma_0$ is also satisfiable.*\n:::\n\n**Theorem (The Compactness Theorem):** $\\Sigma$ is satisfiable if and\nonly if $\\Sigma$ is finitely satisfiable.\n\n**Proof Outline:** $(\\rightarrow)$ is trivial. If $\\Sigma$ is finite,\nthen $\\Sigma\\subseteq \\Sigma$, hence $(\\leftarrow)$ also becomes\ntrivial. Its only important to consider the case where $\\Sigma$ is\ninfinite. We first extend $\\Sigma$ to $\\Delta$ such that\n$\\Delta \\supseteq \\Sigma$ , $\\Delta$ is finitely satisfiable, and for\nall formulas $\\alpha$, either $\\alpha\\in \\Delta$ or\n$\\neg \\alpha \\in \\Delta$. We then find a $V$ that satisfies $\\Delta$.\nHence $V$ satisfies $\\Sigma$.\n\n::: lemma\n**Lemma 2**. *There exists some ordering of all wffs such that every wff\nhas a unique index.*\n:::\n\n::: proof\n*Proof.* Let\n$\\Sigma_0 := \\{\\land, \\lor, \\neg, \\rightarrow, (, )\\} \\cup \\mathbf{A}$\nbe the set of symbols, where $\\mathbf{A}$ is the set of propositional\nvariables. Since $\\Sigma_0$ is countable, fix an injective function\n$$f : \\Sigma_0 \\to \\mathbb{N}.$$\n\nFor any wff $\\alpha = x_1 x_2 \\cdots x_n$ (a finite string of symbols\nfrom $\\Sigma_0$), define its code by\n$$\\ulcorner \\alpha \\urcorner := p_1^{f(x_1)} p_2^{f(x_2)} \\cdots p_n^{f(x_n)},$$\nwhere $p_i$ is the $i$-th prime number.\n\nBy the Fundamental Theorem of Arithmetic, every natural number has a\nunique prime factorization. Hence distinct strings (and therefore\ndistinct wffs) receive distinct codes. Thus this defines an injective\nmapping from the set of all wffs into $\\mathbb{N}$.\n\nFinally, ordering wffs by the natural order of their codes yields the\ndesired enumeration.\u00a0\u25fb\n:::\n\n::: lemma\n**Lemma 3**. *If $\\Sigma$ is finitely satisfiable, then\n$\\Sigma \\cup\\{\\alpha\\}$ or $\\Sigma \\cup \\{\\neg \\alpha\\}$ are finitely\nsatisfiable.*\n:::\n\n::: proof\n*Proof.* Assume both $\\Sigma\\cup\\{\\alpha\\}$ and\n$\\Sigma \\cup \\{\\neg \\alpha\\}$ are not finitely satisfiable.Then there\nexist finite subsets $\\Sigma_0\\subseteq \\Sigma \\cup \\{\\alpha\\}$ and\n$\\Sigma_1\\subseteq \\Sigma \\cup \\{\\neg\\alpha\\}$ such that $\\Sigma_0$ and\n$\\Sigma _1$ are unsatisfiable. Define\n$\\Sigma'=\\Sigma_0\\cup \\Sigma_1\\setminus \\{\\alpha,\\neg\\alpha\\}$. Then,\n$\\Sigma'$ is finite and $\\Sigma'\\subseteq \\Sigma$.Hence, $\\Sigma'$ must\nbe satisfiable. This means there exists some $V$ such that $V$ satisfies\n$\\Sigma'$. For $\\alpha$, either $V(\\alpha)=T$ or $V(\\neg \\alpha)=T$. If\n$V(\\alpha)=T$, then $\\Sigma_0$ is satisfiable. If $V(\\neg \\alpha)=T$,\nthen $\\Sigma_1$ is satisfiable. In both cases, we get a contradiction.\nHence, either $\\Sigma \\cup \\{\\alpha\\}$ or $\\Sigma \\cup \\{\\neg \\alpha\\}$\nmust be fs.\u00a0\u25fb\n:::\n\nWe'll now restate the compactness theorem and prove it.\n\n::: theorem\n**Theorem 6** (Compactness Theorem). *$\\Sigma$ is satisfiable if and\nonly if $\\Sigma$ is finitely satisfiable.*\n:::\n\n::: proof\n*Proof.* $(\\Rightarrow)$ Suppose $\\Sigma$ is satisfiable. Then there\nexists a valuation $V$ such that $V \\models \\Sigma$. Hence\n$V \\models \\Sigma_0$ for every finite $\\Sigma_0 \\subseteq \\Sigma$, so\nevery finite subset is satisfiable.\n\n$(\\Leftarrow)$ We construct $\\Delta$ inductively. Start with\n$\\Delta_0=\\Sigma$. By our first lemma, we can index our wff as\n$\\alpha_i$.For all $i$, we define $\\Delta_{i+1}$ as:\n$$\\Delta_{i+1}=\\begin{cases}\n    \\Delta_i\\cup \\{\\alpha_i\\} \\text{ if it is finitely satisfiable}, \\\\ \\Delta_i\\cup \\{\\neg \\alpha_i\\} \\text{ otherwise.}\n\\end{cases}$$ Our second lemma ensures that all $\\Delta_i$ is finitely\nsatisfiable. Finally, we define $\\Delta$ as:\n$$\\Delta=\\bigcup_{i\\ge 0} \\Delta_i$$ The following facts are observed:\n\n- $\\Sigma \\subseteq \\Delta$\n\n- For any wff $\\alpha$, either $\\alpha\\in \\Delta$ or\n  $\\neg \\alpha \\in \\Delta$\n\n- $\\Delta$ is finitely satisfiable, since any finite subset of $\\Delta$\n  is a finite subset of some $\\Delta_i$. And since $\\Delta_i$ is\n  finitely satisfiable, any finite subset of $\\Delta$ is thus\n  satisfiable.\n\nFinally we must find a $V$ that satisfies $\\Delta$. For all\npropositional variables $p\\in \\mathbf A$, define $V$ as;\n$$V(p)=\\begin{cases}\n    T, \\text{if } p\\in \\Delta\\\\ F,\\text{if } p\\notin \\Delta\n\\end{cases}$$ We claim that $V(\\alpha)=T\\iff \\alpha \\in \\Delta$. We\nprove this by structural induction.\n\n**Base Case:** For any propositional variable $p$,\n$V(p)=T\\iff p\\in \\Delta$, by definition.\n\n**Inductive Step:** Assume $\\alpha$ and $\\beta$ satisfy our property.\nLet $\\gamma=(\\neg \\alpha)$. Then\n$V(\\gamma)=T\\iff V(\\alpha)=F\\iff \\alpha \\notin \\Delta \\iff (\\neg \\alpha)\\in \\Delta\\iff \\gamma\\in \\Delta$.\n\nLet $\\gamma=(\\alpha \\land \\beta)$. Then\n$V(\\gamma)=T\\iff V(\\alpha)=T\\text{ and } V(\\beta)=T\\iff \\alpha, \\beta\\in \\Delta\\iff (\\alpha \\land \\beta)\\in \\Delta\\iff \\gamma \\in \\Delta$.\n\nThus, $V$ satisfies $\\Delta$ and hence, satisfies $\\Sigma$.\n\nTherefore, $\\Sigma$ is satisfiable.\u00a0\u25fb\n:::\n\n# Consequences of the Compactness Theorem\n\nConsider two infinite sets: the set of all propositional variables and\nthe set of all truth assignments. Intuition tells us that the later set\nis bigger than the former (we'll explore this later). But for now, we\nwant to focus on the relationship between these two sets.\n\nConsider $\\Sigma$ to be a subset of the set of all propositional\nvariables. For any such $\\Sigma$, we define $A_\\Sigma$ which is a subset\nof the set of all truth assignments such that:\n$$A_\\Sigma=\\{V: V\\text{ satisfies } \\Sigma\\}$$ We can use this to\ndemonstrate the expressive power of propositional logic. For a moment,\nlet us consider an undirected graph $G=(V,E)$. A graph coloring by $k$\ncolors is a function $c:V\\to\\{1,\\dots,k\\}$ such that for all\n$(x,y)\\in E$, $c(x)\\ne c(y)$. A graph is $k$-colorable if there exists a\ncoloring of the graph with $k$ colors. Given a graph $G=(V,E)$, we can\nexpress its colorability with propositional logic as follows:\n\nLet $V=\\{v_1,\\dots,v_n\\}$, we will use formulas over $p_1,\\dots,p_n$. We\nmust find a set of formulas $\\Sigma$ over $p_1,\\dots,p_n$ such that\n$\\Sigma$ is satisfiable if and only if $G$ is 2-colorable. We define it\nas follows:\n$$\\Sigma_G=\\{((p_i\\rightarrow \\neg p_j)\\land (\\neg p_i\\rightarrow p_j)): (v_i, v_j)\\in E\\}$$\n**Claim:** $G$ is two colorable if and only if $\\Sigma_G$ is\nsatisfiable.\n\n::: proof\n*Proof.* $(\\Rightarrow)$ Let $G$ be two colorable. Then we define a\ntruth assignment $\\mathfrak T_c$ such\nthat:$$\\mathfrak T_c(p_i)=\\begin{cases}\n        T, \\text{ if } c(v_i)=1\\\\ F, \\text{ if } c(v_i)=2\n    \\end{cases}$$ We now check if $\\mathfrak T_c$ satisfies $\\Sigma_G$.\nNote in $\\Sigma_G$, $V(p_i)\\ne V(p_j)$ whenever $(v_i, v_j)\\in E$, i.e.,\nno adjacent variables have the same truth value. Hence, we can see that\n$\\mathfrak T_c$ satisfies $\\Sigma_G$.\n\n$(\\Leftarrow)$ Let $\\mathfrak T$ satisfy $\\Sigma_G$. We define a\ncoloring $c$ as follows: $$c(v_i)=\\begin{cases}\n        1, \\text{ if } \\mathfrak T(p_i)=T\\\\ 2, \\text{ if } \\mathfrak T(p_i)=F\n    \\end{cases}$$\u00a0\u25fb\n:::\n\nWith this (and the compactness theorem), we can infer non-trivial\nresults in graph theory. For example:\n\n**Corollary:** For every graph $G=(V,E)$, $G$ is 2-colorable if and only\nif every finite subgraph of $G$ is $2$-colorable.\n\nSince we have successfully \\\"mapped\\\" satisfiability to 2-colorability,\nwe can apply the theorems we know in propositional logic to obtain\nnon-trivial results.\n\nLets return to $\\Sigma$ and $A_\\Sigma$. Given a $\\Sigma$ we can easily\nfind a corresponding $A_\\Sigma$. But is the reverse possible? Recall\nearlier that we said the set of all truth assignments is larger than the\nset of all formulas.. And since the relation between $\\Sigma$ and\n$A_\\Sigma$ is one to one, there are some subsets of truth assignments\nthat don't correspond to any subset of formulas. But we can prove this\nfact without invoking set theory.\n\n::: lemma\n**Lemma 4**. *For every $i$, let $V_i$ be the truth assignment defined\nby: $$V_i(p_j)=\\begin{cases}\n        T, \\text{ if } j\\le i\\\\ F, \\text{ if } j>i\n    \\end{cases}$$ There exists no set of propositional formulas $\\Sigma$\nsuch that $A_\\Sigma=\\{V_i: i\\in\\mathbb N\\}$.*\n:::\n\n::: proof\n*Proof.* Assume $\\Sigma$ is a set of formulas satisfied by each $V_i$\nand no other $V$. Let $\\Sigma'=\\Sigma\\cup \\{p_i\\}_{i\\in \\mathbb N}$. If\n$\\Sigma'$ is satisfiable, then $V_T$ (all true assignment) satisfies\n$\\Sigma$. However, by our assumption on $\\Sigma$, $V_T$ shouldn't\nsatisfy it. Hence, $\\Sigma'$ is not satisfiable.\n\nRecall that every finite subset of $\\Sigma'$ contains finite set of\n$p_i$s and/or a finite subset of $\\Sigma$, hence can be satisfied with\n$V_i$. Thus, $\\Sigma'$ is finitely satisfiable, hence satisfiable. Thus,\nwe have a contradiction.\u00a0\u25fb\n:::\n\n::: definition\n**Definition 3**. *A set $W$ of propositional truth assignments is\ndefinable if there exists a set $\\Sigma$ of formulas such that:\n$$W=\\{V: V\\text{ satisfies } \\Sigma\\}$$*\n:::\n\nWhen $\\Sigma$ grows, $W$ shrinks.\n\nLemma 6.1 shows us that not all $W$s are definable.\n\n# Proof Syntax in PL\n\nWe now make a brief return to syntax. We want to build a proof system\nfor propositional logic.\n\nDesirable properties of proof systems:\n\n1.  It can only prove \\\"correct\\\" statements.\n\n2.  There is a \\\"method\\\" to check whether a given object is a proof.\n\n3.  Every correct statement has a proof.\n\nThe existence of such a proof system depends on our notion of\n\\\"correct\\\" and the language we're working in.\n\nIn $\\textsf{PL}$, \\\"correct\\\" stands for a tautology. Hence, a proof of\n$\\alpha$ will be a truth table that has all $T$s in the right most\ncolumn. But this proof system hardly applies to any branch of\nmathematics. So we need a better system.\n\nProofs in mathematics typically have two components: Axioms and\ndeduction rules. Our system will be mirroring this. We'll be relying on\nthe symbols $\\{\\neg, \\rightarrow\\}$ for simplicity.\n\n**Axioms:** Any wff of one of the following forms:\n\n1.  $(\\alpha \\rightarrow (\\beta\\rightarrow \\alpha))$\n\n2.  $\\Big((\\alpha \\rightarrow (\\beta\\rightarrow \\gamma))\\rightarrow((\\alpha \\rightarrow \\beta)\\rightarrow(\\alpha \\rightarrow \\gamma))\\Big)$\n\n3.  $\\Big(\\big((\\neg \\alpha)\\rightarrow (\\neg \\beta)\\big ) \\rightarrow(\\beta\\rightarrow \\alpha)\\Big)$\n\nEach of these axioms is a tautology. But not the reverse, i.e, there are\ntautologies which aren't axioms ($(p\\rightarrow p)$, for example).\n\n**Deduction Rules:**\n\n1.  Modus Ponens:\n    $$\\frac{\\alpha \\quad (\\alpha \\rightarrow \\beta)}{\\beta}$$\n\nThis is the only deduction rule we need. Therefore, the set of provable\nwffs is the inductive set defined as $I(\\text{Axioms, Modus Ponens})$. A\ngiven proposition is a theorem if it belongs to this set.\n\nA formal proof is a construction sequence in the inductive set. That is,\n$\\alpha_1\\dots\\alpha_n$ is a formal proof of some formula $\\beta$ if\neach $\\alpha_i$ is either an axiom or the result of applying the Modus\nPonens to some $\\alpha_j, \\alpha_k$ where $j,k<i$.\n\n**Example:** Show that the statement $(\\alpha\\rightarrow\\alpha)$ is\nprovable.\n\n1.  $(\\alpha\\rightarrow((\\alpha \\rightarrow \\alpha)\\rightarrow \\alpha))$ -\n    [P1]{.sans-serif}\n\n2.  $(\\alpha\\rightarrow((\\alpha \\rightarrow \\alpha)\\rightarrow \\alpha))\\rightarrow ((\\alpha \\rightarrow (\\alpha \\rightarrow \\alpha))\\rightarrow (\\alpha \\rightarrow \\alpha)))$ -\n    [P2]{.sans-serif}\n\n3.  $((\\alpha \\rightarrow (\\alpha \\rightarrow \\alpha))\\rightarrow (\\alpha \\rightarrow \\alpha))$ -\n    Modus Ponens (1,2)\n\n4.  $(\\alpha \\rightarrow (\\alpha \\rightarrow \\alpha))$ -\n    [P1]{.sans-serif}\n\n5.  $(\\alpha \\rightarrow \\alpha)$ - Modus Ponens (3,4)\n\n**Notation:** We use $\\vdash$ to denote provability. $\\vdash \\alpha$\ncorresponds to \\\"$\\alpha$ has a formal proof\\\".\n\n::: theorem\n**Theorem 7** (Soundness Theorem). *For every formula $\\alpha$, if\n$\\vdash \\alpha$, then $\\alpha$ is a tautology.*\n:::\n\n::: proof\n*Proof.* We proceed by generalized induction on $I$.\n\n**Base Case:** We check that every axiom is a tautology, which holds by\ndefinition.\n\n**Inductive Step:** Assume both $\\alpha$ and\n$(\\alpha \\rightarrow \\beta)$ are tautologies, we must show that $\\beta$\nis a tautology. For contradiction, assume $\\beta$ is not a tautology.\nThen there is an assignment $\\bar V$ such that $\\bar V(\\beta)=F$ while\n$\\bar V(\\alpha)=T$ and $\\bar V(\\alpha \\rightarrow \\beta)=T$. But if\n$\\bar V(\\beta)=F$, then $\\bar V(\\alpha \\rightarrow \\beta)=F$, hence a\ncontradiction. Therefore, $\\beta$ must be a tautology.\u00a0\u25fb\n:::\n\n**Proofs from Assumptions:** Let $\\Sigma$ be a set of formulas. The set\nof formal theorems under the assumption $\\Sigma$ is defined as:\n$$\\textsf{Thm}(\\Sigma)=I(\\text{Axioms}\\cup \\Sigma, \\text{Modus Ponens})$$\n$\\alpha_1\\dots\\alpha_n$ is a formal proof under $\\Sigma$ if for each\n$\\alpha_i$, $\\alpha_i$ is an axiom, a member of $\\Sigma$, or the result\nof applying the Modus Ponens to some $\\alpha_j, \\alpha_k$ where $j,k<i$.\n\n**Example**; For every $\\alpha, \\beta$ show that\n$\\{\\alpha, (\\neg \\alpha)\\}\\vdash \\beta$.\n\n1.  $\\neg \\alpha \\rightarrow(\\neg \\beta\\rightarrow \\neg \\alpha)$ -\n    [P1]{.sans-serif}\n\n2.  $\\neg \\alpha$ - Assumption\n\n3.  $\\neg \\beta\\rightarrow \\neg \\alpha$ - Modus Ponens (1,2)\n\n4.  $(\\neg \\beta\\rightarrow \\neg \\alpha)\\rightarrow (\\alpha \\rightarrow \\beta)$ -\n    [P3]{.sans-serif}\n\n5.  $\\alpha \\rightarrow \\beta$ - Modus Ponens (3,4)\n\n6.  $\\alpha$ - Assumption\n\n7.  $\\beta$ - Modus Ponens (5,6)\n\nThis shows us that if our assumptions involve a contradiction, we can\nliterally prove anything.\u00a0\n\n**Properties of Proofs from Assumptions**:\n\n1.  **Extended Soundness Theorem:** If $\\Sigma\\vdash \\alpha$, then\n    $\\Sigma \\models \\alpha$.\n\n2.  **Monotonicity:** For every $\\Sigma, \\Sigma', \\alpha$, if\n    $\\Sigma\\vdash \\alpha$ and $\\Sigma\\subseteq \\Sigma'$, then\n    $\\Sigma'\\vdash \\alpha$. In other words,\n    $\\textsf{Th}(\\Sigma)\\subseteq \\textsf{Th}(\\Sigma')$.\n\n    ::: proof\n    *Proof.* Since $\\Sigma\\vdash \\alpha$, there is a formal proof of\n    $\\alpha$ such that $\\alpha_1\\dots\\alpha_n$ where $\\alpha_n=\\alpha$.\n    Each $\\alpha_i$ is an axiom or in $\\Sigma$, in which case\n    $\\alpha_i \\in \\Sigma'$, or $\\alpha_i$ is the outcome of modus\n    ponens. Therefore, $\\alpha_1\\dots\\alpha_n$ is a proof on\n    $\\Sigma'$.\u00a0\u25fb\n    :::\n\n3.  **Strong Monotonicity:** If for every $\\alpha \\in \\Sigma'$,\n    $\\Sigma\\vdash \\alpha$, then\n    $\\textsf{Th}(\\Sigma')\\subseteq \\textsf{Th}(\\Sigma)$.\n\n4.  **The Deduction Theorem:** For every $\\Sigma, \\alpha, \\beta$,\n    $\\Sigma \\cup \\{\\alpha\\}\\vdash \\beta$ iff\n    $\\Sigma \\vdash (\\alpha\\rightarrow \\beta)$.\n\n    ::: proof\n    *Proof.* $(\\Rightarrow)$ Let $\\Sigma \\cup \\{\\alpha\\}\\vdash \\beta$.\n    We rephrase it as for all\n    $\\beta \\in \\textsf{Th}(\\Sigma \\cup \\{\\alpha\\})$,\n    $\\Sigma \\vdash (\\alpha \\rightarrow \\beta)$. We prove by generalizes\n    induction on $\\textsf{Th}(\\Sigma \\cup \\{\\alpha\\})$.\n\n    **Base Case:** We have three cases.\n\n    *Case 1:* $\\beta$ is an axiom. Then the proof sequence\n\n    - $\\beta$ - Axiom\n\n    - $\\beta \\rightarrow (\\alpha \\rightarrow \\beta)$ - [P1]{.sans-serif}\n\n    - $(\\alpha \\rightarrow \\beta)$ - Modus Ponens.\n\n    *Case 2:* $\\beta$ is in $\\Sigma$\n\n    - $\\beta$ - Assumption\n\n    - $\\beta \\rightarrow (\\alpha \\rightarrow \\beta)$ - [P1]{.sans-serif}\n\n    - $(\\alpha \\rightarrow \\beta)$ - Modus Ponens.\n\n    *Case 3:* $\\beta=\\alpha$\n\n    - $\\alpha$ - Assumption\n\n    - $\\alpha \\rightarrow (\\alpha \\rightarrow \\alpha)$ -\n      [P1]{.sans-serif}\n\n    - $\\alpha \\rightarrow \\alpha$ - Modus Ponens\n\n    **Inductive Step:** Assume\n    $\\Sigma \\vdash (\\alpha \\rightarrow \\gamma)$ and\n    $\\Sigma \\vdash (\\alpha \\rightarrow (\\gamma \\rightarrow\\delta))$ and\n    show that $\\Sigma \\vdash (\\alpha \\rightarrow \\delta)$. By strong\n    monotonicity, it suffices to show that\n    $\\Sigma \\cup \\{(\\alpha \\rightarrow\\gamma), (\\alpha \\rightarrow (\\gamma \\rightarrow \\delta)\\}\\vdash \\alpha \\rightarrow \\delta$.\n    The proof sequence is as follows:\n\n    - $(\\alpha \\rightarrow(\\gamma \\rightarrow \\delta))\\rightarrow((\\alpha \\rightarrow \\gamma)\\rightarrow(\\alpha \\rightarrow \\delta))$\n      -[P3]{.sans-serif}\n\n    - $(\\alpha \\rightarrow (\\gamma \\rightarrow \\delta)$ - Assumption\n\n    - $((\\alpha \\rightarrow \\gamma)\\rightarrow(\\alpha \\rightarrow \\delta))$ -\n      Modus Ponens\n\n    - $(\\alpha \\rightarrow \\gamma)$ - Assumption\n\n    - $(\\alpha \\rightarrow \\delta)$ - Modus Ponens\n\n    $(\\Leftarrow)$ Let $\\Sigma \\vdash (\\alpha \\rightarrow\\beta)$. By\n    monotonicity, we know that\n    $\\Sigma \\cup \\{\\alpha\\}\\vdash (\\alpha \\rightarrow \\beta)$. Then by\n    strong monotonicity, it suffices to show that\n    $\\Sigma\\cup \\{\\alpha, (\\alpha \\rightarrow \\beta)\\}\\vdash \\beta$,\n    which easily follows by modus ponens.Hence\n    $\\Sigma \\cup \\{\\alpha\\}\\vdash \\beta$.\u00a0\u25fb\n    :::\n\n**Application of the deduction theorem:** Show that\n$\\vdash ((\\neg (\\neg \\alpha))\\rightarrow \\alpha)$\n\nIt suffices to show that $\\{\\neg \\neg \\alpha\\}\\vdash \\alpha$.\n\n1.  $\\neg \\neg \\alpha \\rightarrow(\\neg\\neg\\neg\\neg \\alpha\\rightarrow \\neg\\neg \\alpha)$ -\n    [P1]{.sans-serif}\n\n2.  $\\neg \\neg \\alpha$ - Assumption\n\n3.  $\\neg\\neg \\neg \\neg \\alpha \\rightarrow \\neg \\neg \\alpha$ - Modus\n    Ponens (1,2)\n\n4.  $(\\neg\\neg \\neg \\neg \\alpha \\rightarrow \\neg \\neg \\alpha)\\rightarrow (\\neg \\alpha \\rightarrow \\neg\\neg\\neg \\alpha)$ -\n    [P3]{.sans-serif}\n\n5.  $\\neg \\alpha \\rightarrow \\neg\\neg\\neg \\alpha$ - Modus Ponens (3,4)\n\n6.  $(\\neg \\alpha \\rightarrow \\neg\\neg\\neg \\alpha)\\rightarrow(\\neg\\neg \\alpha \\rightarrow \\alpha)$ -\n    [P3]{.sans-serif}\n\n7.  $(\\neg\\neg \\alpha \\rightarrow \\alpha)$ - Modus Ponens (5,6)\n\n8.  $\\alpha$ - Modus Ponens (2,7)\n\n::: definition\n**Definition 4** (Consistency). *$\\Sigma$ is consistent if no $\\alpha$\nexists such that $\\Sigma \\vdash \\alpha$ and $\\Sigma \\vdash \\neg\\alpha$.*\n:::\n\n::: definition\n**Definition 5**. *A more \\\"syntactic\\\" definition goes something like:\n$\\Sigma$ is consistent if there exists some $\\alpha$ such that\n$\\Sigma \\not \\vdash \\alpha$. (Recall that we showed that an inconsistent\nsystem can prove anything.)*\n:::\n\n**Claim:** The two definitions are equivalent.\n\n::: proof\n*Proof.* $(\\Rightarrow)$ $\\Sigma$ is consistent if no $\\alpha$ exists\nsuch that $\\Sigma \\vdash \\alpha$ and $\\Sigma \\vdash \\neg\\alpha$. If\n$\\Sigma \\vdash \\alpha$, then $\\Sigma \\not \\vdash \\neg \\alpha$ and vice\nversa. Hence there exists some $\\alpha$ such that\n$\\Sigma \\not\\vdash \\alpha$.\n\n$(\\Leftarrow)$ Let there exist some $\\beta$ such that\n$\\Sigma \\not \\vdash \\beta$. If $\\Sigma \\vdash \\alpha$ and\n$\\Sigma \\vdash \\neg \\alpha$ for some $\\alpha$, then\n$\\Sigma \\vdash \\Sigma \\cup \\{\\alpha, \\neg\\alpha\\}\\vdash \\{\\alpha, \\neg \\alpha\\}$.\nBut, $\\{\\alpha, \\neg \\alpha\\}\\vdash \\beta$ for all $\\beta$. Hence,\n$\\Sigma \\vdash \\beta$ for all $\\beta$; a contradiction.\u00a0\u25fb\n:::\n\nLet $\\Sigma \\subseteq \\Sigma'$. If $\\Sigma'$ is consistent, then so is\n$\\Sigma$. Hence,$\\varnothing$ is consistent (?)\n\nThe Soundness theorem states that if $\\vdash \\alpha$, then $\\alpha$ is a\ntautology. For any propositional variable $p$, $\\not \\vdash p$ since $p$\ncan not be a tautology. Hence $\\varnothing$ is consistent.\n\n::: theorem\n**Theorem 8**. *Every satisfiable $\\Sigma$ is consistent.*\n:::\n\n::: proof\n*Proof.* Let $\\Sigma$ be satisfiable. If $\\Sigma \\vdash \\alpha$ and\n$\\Sigma \\vdash \\neg \\alpha$. By the soundness theorem, it follows that\n$\\Sigma \\models \\alpha$ and $\\Sigma \\models \\neg \\alpha$. Hence for some\ntruth assignment $\\bar V$, where $\\bar V(\\Sigma)=T$, $\\bar V(\\alpha)=T$\nand $\\bar V(\\neg \\alpha)=T$; a contradiction.\u00a0\u25fb\n:::\n\n::: definition\n**Definition 6**. *We say that $\\Sigma$ is maximally consistent if\n$\\Sigma$ is consistent such that for every $\\alpha$, either\n$\\Sigma \\vdash \\alpha$ or $\\Sigma \\cup \\{\\alpha\\}$ is inconsistent.*\n:::\n\nNote that whenever $\\Sigma \\vdash \\alpha$, then $\\Sigma \\cup \\{\\alpha\\}$\nis no stronger that $\\Sigma$, i.e., for any $\\beta$, if\n$\\Sigma \\cup \\{\\alpha\\}\\vdash \\beta$, then $\\Sigma \\vdash \\beta$.\n\n**Example:** Let $\\Sigma=\\{p_1\\}$ over the variables\n$\\{p_i\\}_{i\\in \\mathbb N}$. We claim $\\Sigma$ is consistent but not\nmaximally consistent.\n\nIt's easy to see that $\\Sigma$ is consistent since it is satisfiable.\nNow, let $\\alpha=p_2$. Then $\\{p_1\\}\\not\\models p_2$ since we can find a\ntruth assignment that doesn't agree on the two variables. Hence, it\nfollows that $\\{p_1\\}\\not \\vdash p_2$. Consider now $\\{p_1,p_2\\}$. This\nset is still consistent because it is satisfiable. Hence, $\\Sigma$ is\nnot maximally consistent.\n\n::: lemma\n**Lemma 5**. *For every consistent $\\Sigma$, there exists a maximally\nconsistent $\\Sigma'$ such that $\\Sigma\\subseteq \\Sigma'$.*\n:::\n\n::: proof\n*Proof.* Let $\\{\\alpha_i\\}_{i \\in \\mathbb N}$ be a list of all wffs over\n$\\{p_i\\}_{i\\in \\mathbb N}$. Let $\\Sigma_0=\\Sigma$. We construct a\nsequence of sets of wffs\n$\\Sigma_0\\subseteq \\Sigma_1\\subseteq \\dots \\Sigma_n\\subseteq \\Sigma_{n+1}$\nfor all $n\\in \\mathbb N$. Such that:\n\n1.  Each $\\Sigma_i$ is consistent.\n\n2.  For every $i$, either $\\Sigma_i\\vdash \\alpha_i$ or\n    $\\Sigma_i\\vdash \\neg \\alpha_i$.\n\nWe proceed by induction on $i$.\n\n**Base Case:** $\\Sigma_0=\\Sigma$. By definition, $\\Sigma$ is consistent.\n\n**Inductive Step:** Given $\\Sigma_i$, if\n$\\Sigma_i\\vdash \\neg \\alpha_{i+1}$, let $\\Sigma_i=\\Sigma_{i+1}$. If\n$\\Sigma_i\\not\\vdash \\alpha_{i+1}$, let\n$\\Sigma_{i+1}=\\Sigma_i\\cup\\{\\alpha_{i+1}\\}$. In either case, both 1 and\n2 are satisfied.\n\nNow, we have $\\Sigma'=\\bigcup_{i\\in \\mathbb N} \\Sigma_i$. We now claim\nthat $\\Sigma'$ is maximally consistent. For every $\\alpha$,\n$\\alpha=\\alpha_i$ for some $i\\in \\mathbb N$. Hence, by requirements,\n$\\Sigma_i\\vdash \\alpha_i$ or $\\Sigma_i\\vdash \\neg \\alpha_i$. We have\n$\\Sigma_i\\subseteq \\Sigma'$ for all $i$. By monotonicity, it follows\nthat $\\Sigma_i\\vdash \\alpha_i$ or $\\Sigma_i\\vdash \\neg \\alpha_i$.\n\nAssume, for contradiction, $\\Sigma'$ is not consistent. Then for some\n$\\alpha$, $\\Sigma' \\vdash \\alpha$ and $\\Sigma'\\vdash \\neg \\alpha$. Let\n$\\beta_1,\\dots,\\beta_k$ be a formal proof of $\\alpha$ from $\\Sigma '$\nand let $\\gamma_1,\\dots, \\gamma_m$ be the formal proof of $\\neg \\alpha$\nfrom $\\Sigma'$. Each $\\beta_i$ that is an assumption belongs to some\n$\\Sigma_{m_i}\\subseteq \\Sigma'$. Similarly, each $\\gamma_i$ that is an\nassumption belongs to some $\\Sigma_{m_j}\\subseteq \\Sigma'$. Since both\nproofs are finite, there is some $i^*$ that is bigger than all $m_i$ and\n$m_j$. Therefore, each assumptions $\\beta_i,\\gamma_i\\in \\Sigma_{i^*}$.\nHence, $\\Sigma_{i^*}$ proves both $\\alpha$ and $\\neg \\alpha$, making it\ninconsistent. This contradicts our original requirement that each\n$\\Sigma_i$ must be consistent.\u00a0\u25fb\n:::\n\n::: theorem\n**Theorem 9**. *Every consistent $\\Sigma$ is satisfiable.*\n:::\n\n::: proof\n*Proof.* Let $\\Sigma'$ be a maximally consistent set of wffs such that\n$\\Sigma\\subseteq \\Sigma'$. Define a truth assignment $\\bar V_{\\Sigma'}$\nas follows: $$\\bar V_{\\Sigma'}(p_i)=\\begin{cases}\n        T \\text{ if } \\Sigma'\\vdash p_i\\\\ F\\text{, otherwise }\n    \\end{cases}$$ We claim for every formula $\\alpha$,\n$\\bar V_{\\Sigma'}(\\alpha)=T$ iff $\\Sigma'\\vdash \\alpha$. We prove this\nby generalized induction on the set of all formulas.\n\n**Base Case:** Let $\\alpha=p$. Then, by definition, the desired property\nholds.\n\n**Inductive Step:** Assume the claim holds for $\\beta$ and $\\gamma$. We\nnow show it holds for $\\neg \\beta$ and $\\beta\\rightarrow \\gamma$.\n\n*Case 1:* $(\\Rightarrow)$ For $\\neg \\beta$, if\n$\\Sigma'\\vdash \\neg \\beta$, by consistency, $\\Sigma'\\not\\vdash\\beta$.\nHence, by the induction hypothesis $\\bar V_{\\Sigma'}(\\beta)=F$. Thus\n$\\bar V_{\\Sigma'}(\\neg\\beta)=T$. $(\\Leftarrow)$ Assume\n$\\Sigma'\\not\\vdash \\neg\\beta$. Then by maximality,\n$\\Sigma'\\vdash \\beta$. By the induction hypothesis\n$\\bar V_{\\Sigma'}(\\beta)=T$, hence $\\bar V_{\\Sigma'}(\\neg \\beta)=F$.\n\n*Case 2:* $(\\Rightarrow)$ For $\\beta \\rightarrow \\gamma$, if\n$\\Sigma'\\vdash (\\beta \\rightarrow \\gamma)$. Then either\n$\\Sigma'\\vdash \\beta$, which means $\\Sigma'\\vdash \\gamma$. Using the\ninduction hypothesis $\\bar V_{\\Sigma'}(\\beta \\rightarrow \\gamma)=T$. Or,\n$\\Sigma'\\not \\vdash \\beta$, in which case we have\n$\\bar V_{\\Sigma'}(\\beta\\rightarrow \\gamma)=T$. $(\\Leftarrow)$ If\n$\\Sigma'\\not \\vdash (\\beta \\rightarrow \\gamma)$, then\n$\\Sigma'\\not \\vdash \\gamma$, because if it does, we can use the axiom\n$\\gamma \\rightarrow (\\beta \\rightarrow \\gamma)$ and modus ponens to\nobtain $\\Sigma'\\vdash (\\beta \\rightarrow \\gamma)$. By the induction\nhypotheses, we have $\\bar V_{\\Sigma'}(\\gamma)=F$. For contradiction,\nassume $\\bar V_{\\Sigma'}(\\beta)=F$. Then $\\Sigma '\\not\\vdash \\beta$,\nhence, $\\Sigma'\\vdash \\neg \\beta$. Hence,\n$\\Sigma'\\vdash (\\beta \\rightarrow \\gamma)$; a contradiction. Therefore,\n$\\bar V_{\\Sigma'}(\\beta)=T$.\u00a0\u25fb\n:::\n\n::: theorem\n**Theorem 10** ([Completeness Theorem]{.sans-serif}). *For all $\\alpha$\nand any set of wffs $\\Sigma$, if $\\Sigma \\models \\alpha$,\n$\\Sigma \\vdash \\alpha$.*\n:::\n\n::: proof\n*Proof.* Let $\\Sigma \\models \\alpha$. For contradiction, assume\n$\\Sigma \\not \\vdash \\alpha$. It follows then that\n$\\Sigma \\cup \\{\\neg \\alpha\\}$ is consistent. By our earlier theorem, we\nsee that $\\Sigma \\cup \\{\\neg \\alpha\\}$ is satisfiable. Hence,\n$\\Sigma \\not \\models \\alpha$; a contradiction.\u00a0\u25fb\n:::\n\n**Syntax and Semantics Relation Summarized**\n\n- $\\vdash \\alpha \\iff \\alpha$ is a tautology\n\n- $\\Sigma \\vdash \\alpha\\iff \\Sigma \\models \\alpha$\n\n- $\\Sigma$ is consistent $\\iff$ $\\Sigma$ is satisfiable\n\n- $\\Sigma$ is maximally consistent $\\iff$ $\\Sigma$ is maximally\n  satisfiable.\n\nRecall the compactness theorem that states $\\Sigma$ is satisfiable if\nand only if every finite subset of $\\Sigma$ is satisfiable. Completeness\ngives us a simpler proof of this theorem.\n\n**Proof:** *(Sketch)* $\\Sigma$ satisfiable $\\iff$ $\\Sigma$ consistent\n$\\iff$ every finite subset of $\\Sigma$ is consistent $\\iff$ every finite\nsubset of $\\Sigma$ is satisfiable.\n\n# Introduction to Predicate Calculus (FOL)\n\nPerhaps one of the most famous deductive examples is:\n\n- Every man is mortal.\n\n- Socrates is a man.\n\n- Therefore, Socrates is mortal.\n\nIf we try to express this deduction in propositional logic we obtain\nthree sentences with no relation to each other. Therefore, we get\n$\\{P,Q\\}\\models R$, which is nonsensical. Propositional logic lacks the\nexpressive power that demonstrates the relations between these three\nsentences.\n\nPredicate Calculus (First-Order Logic) breaks a statement into two\ncomponents: objects and properties. FOL is actually a large family of\nlanguages. Since FOL is a language, it relies on alphabets which consist\nof:\n\n1.  **Variables** such as $v_0, \\dots, v_n, x, y$ that serve as\n    placeholders for objects in the domain under consideration.\n\n2.  **Logical Operators** such as\n    $\\neg, \\land, \\lor, \\rightarrow, \\leftrightarrow$. However,\n    minimally, we only consider $\\neg$ and $\\land$ since the others\n    could all be derived using these two.\n\n3.  **Logical quantifiers** $\\exists$ and $\\forall$ (Again, minimally,\n    we only consider $\\exists$) where quantification is restricted to\n    objects only and not to formulae or sets of objects (but the objects\n    themselves may be sets).\n\n4.  **Equality Symbol** $=$\n\n5.  **Constant Symbols** that stand for fixed individual objects in the\n    domain.\n\n6.  **Function Symbols** which stand for fixed functions that take\n    objects as arguments and return objects as values. Each function as\n    an associated arity (number of inputs it can take).\n\n7.  **Relation Symbols** which stand for fixed relations between objects\n    or their properties.\n\nFix a first-order language $\\mathcal{L}$ consisting of:\n\n- constant symbols $\\{a_i\\}_{i \\in \\mathbb{N}}$,\n\n- variable symbols $\\{x_i\\}_{i \\in \\mathbb{N}}$,\n\n- function symbols $\\{f_i\\}_{i \\in \\mathbb{N}}$ (each with specified\n  arity),\n\n- relation symbols $\\{R_i\\}_{i \\in \\mathbb{N}}$ (each with specified\n  arity).\n\nFirst, we define the collection of \\\"words\\\" that denote objects. We\ncall these **terms**. The set of **terms** of $\\mathcal{L}$ is defined\ninductively as follows:\n\n1.  Every variable and constant symbol is a term.\n\n2.  If $f$ is an $n$-ary function symbol and $t_1, \\dots, t_n$ are\n    terms, then $$f(t_1, \\dots, t_n)$$ is a term.\n\n3.  Nothing else is a term.\n\nThe set of **atomic formulas** consists of expressions of the form:\n\n- $R(t_1, \\dots, t_n)$, where $R$ is an $n$-ary relation symbol and\n  $t_1, \\dots, t_n$ are terms,\n\n- $t_1 = t_2$, where $t_1, t_2$ are terms (if equality is included in\n  the language).\n\nThe set of **well-formed formulas** (wffs) of $\\mathcal{L}$ is defined\ninductively as the smallest set satisfying:\n\n1.  Every atomic formula is a wff.\n\n2.  If $\\varphi$ and $\\psi$ are wffs, then so are:\n    $$\\neg \\varphi, \\quad (\\varphi \\land \\psi), \\quad (\\varphi \\lor \\psi), \\quad (\\varphi \\rightarrow \\psi), \\quad (\\varphi \\leftrightarrow \\psi).$$\n\n3.  If $\\varphi$ is a wff and $x$ is a variable, then:\n    $$\\exists x \\, \\varphi \\quad \\text{and} \\quad \\forall x \\, \\varphi$$\n    are wffs.\n\n4.  Nothing else is a wff.\n\nThus, the collection of wffs in a language $\\mathcal{L}$ is generated\ninductively from atomic formulas using logical connectives and\nquantifiers.\n\n**Free Variable:** Any variable that is not bounded by a quantifier is\nknown as a free variable. $\\mathbf F(\\varphi)$ denotes the set of free\nvariables in $\\varphi$. We define this set inductively as well.\n\n1.  If $\\varphi$ is an atomic formula:\n\n    - If $\\varphi \\equiv R(t_1, \\dots, t_n)$, then\n      $$\\mathbf{F}(\\varphi) = \\bigcup_{i=1}^n \\mathbf{F}(t_i),$$ where\n      $\\mathbf{F}(t_i)$ denotes the variables occurring in the term\n      $t_i$.\n\n    - If $\\varphi \\equiv (t_1 = t_2)$, then\n      $$\\mathbf{F}(\\varphi) = \\mathbf{F}(t_1) \\cup \\mathbf{F}(t_2).$$\n\n2.  For terms, define $\\mathbf{F}(t)$ inductively:\n\n    - If $t$ is a variable $x$, then $\\mathbf{F}(t) = \\{x\\}$.\n\n    - If $t$ is a constant symbol, then $\\mathbf{F}(t) = \\emptyset$.\n\n    - If $t \\equiv f(t_1, \\dots, t_n)$, then\n      $$\\mathbf{F}(t) = \\bigcup_{i=1}^n \\mathbf{F}(t_i).$$\n\n3.  If $\\varphi \\equiv \\neg \\psi$, then\n    $$\\mathbf{F}(\\varphi) = \\mathbf{F}(\\psi).$$\n\n4.  If $\\varphi \\equiv (\\psi \\,\\circ\\, \\theta)$, where\n    $\\circ \\in \\{\\land, \\lor, \\rightarrow, \\leftrightarrow\\}$, then\n    $$\\mathbf{F}(\\varphi) = \\mathbf{F}(\\psi) \\cup \\mathbf{F}(\\theta).$$\n\n5.  If $\\varphi \\equiv \\exists x \\, \\psi$ or\n    $\\varphi \\equiv \\forall x \\, \\psi$, then\n    $$\\mathbf{F}(\\varphi) = \\mathbf{F}(\\psi) \\setminus \\{x\\}.$$\n\n**Remark:** A formula $\\varphi$ is called a *sentence* if\n$\\mathbf{F}(\\varphi) = \\varnothing$.\n\n# Semantics in FOL\n\nGiven a first-order language $\\mathcal{L}$, an\n**$\\mathcal{L}$-structure** (or *interpretation*) $\\mathcal{M}$ consists\nof the following data:\n\n- A non-empty set $M$, called the **universe** or **domain** of\n  $\\mathcal{M}$.\n\n- For each constant symbol $c \\in \\mathcal{L}$, an element\n  $c^{\\mathcal{M}} \\in M$.\n\n- For each $n$-ary function symbol $f \\in \\mathcal{L}$, a function\n  $$f^{\\mathcal{M}} : M^n \\to M.$$\n\n- For each $n$-ary relation symbol $R \\in \\mathcal{L}$, a relation\n  $$R^{\\mathcal{M}} \\subseteq M^n.$$\n\n- If equality is part of the language, it is interpreted as actual\n  equality on $M$, i.e.,\n  $$=^{\\mathcal{M}} \\;=\\; \\{(a,a) \\mid a \\in M\\}.$$\n\n**Remark:** We often write\n$$\\mathcal{M} = (M, (c^{\\mathcal{M}})_{c \\in \\mathcal{L}}, (f^{\\mathcal{M}})_{f \\in \\mathcal{L}}, (R^{\\mathcal{M}})_{R \\in \\mathcal{L}})$$\nto emphasize the interpretation of the symbols of $\\mathcal{L}$.\n\nLet $\\mathcal{M}$ be an $\\mathcal{L}$-structure with domain $M$, and let\n$V$ be the set of variables.\n\nAn **assignment function** is a map $$s : V \\to M,$$ which assigns to\neach variable an element of the domain.\n\nWe extend $s$ to a function $$\\bar{s} : T \\to M,$$ where $T$ is the set\nof terms of $\\mathcal{L}$, called the **evaluation of terms under $s$**.\nThis extension is defined inductively as follows:\n\n1.  If $t$ is a variable $x$, then $$\\bar{s}(x) = s(x).$$\n\n2.  If $t$ is a constant symbol $c$, then\n    $$\\bar{s}(c) = c^{\\mathcal{M}}.$$\n\n3.  If $t \\equiv f(t_1, \\dots, t_n)$, where $f$ is an $n$-ary function\n    symbol, then $$\\bar{s}(f(t_1, \\dots, t_n)) \n        \\;=\\; \n        f^{\\mathcal{M}}\\big(\\bar{s}(t_1), \\dots, \\bar{s}(t_n)\\big).$$\n\n**Remark:** The function $\\bar{s}$ is uniquely determined by $s$ and the\nstructure $\\mathcal{M}$.\n\nWe now extend the evaluation of terms to formulas by defining when a\nformula is **satisfied** in a structure under an assignment.\n\nLet $\\mathcal{M}$ be an $\\mathcal{L}$-structure with domain $M$, and let\n$s : V \\to M$ be an assignment. We define, inductively, what it means\nfor a formula $\\varphi$ to be satisfied in $\\mathcal{M}$ under $s$,\nwritten $$\\mathcal{M} \\models \\varphi[s].$$\n\n1.  **Atomic formulas:**\n\n    - If $\\varphi \\equiv R(t_1, \\dots, t_n)$, then\n      $$\\mathcal{M} \\models R(t_1, \\dots, t_n)[s]\n              \\quad \\text{iff} \\quad\n              \\big(\\bar{s}(t_1), \\dots, \\bar{s}(t_n)\\big) \\in R^{\\mathcal{M}}.$$\n\n    - If $\\varphi \\equiv (t_1 = t_2)$, then\n      $$\\mathcal{M} \\models (t_1 = t_2)[s]\n              \\quad \\text{iff} \\quad\n              \\bar{s}(t_1) = \\bar{s}(t_2).$$\n\n2.  **Negation:** $$\\mathcal{M} \\models \\neg \\psi[s]\n        \\quad \\text{iff} \\quad\n        \\mathcal{M} \\not\\models \\psi[s].$$\n\n3.  **Conjunction:** $$\\mathcal{M} \\models (\\psi \\land \\theta)[s]\n        \\quad \\text{iff} \\quad\n        \\mathcal{M} \\models \\psi[s] \\ \\text{and} \\ \\mathcal{M} \\models \\theta[s].$$\n\n4.  **Other connectives:** Defined in the usual way from $\\neg$ and\n    $\\land$.\n\n5.  **Existential quantifier:**\n    $$\\mathcal{M} \\models \\exists x \\, \\psi[s]\n        \\quad \\text{iff} \\quad\n        \\text{there exists } a \\in M \\text{ such that } \\mathcal{M} \\models \\psi[s[x \\mapsto a]].$$\n\n6.  **Universal quantifier:** $$\\mathcal{M} \\models \\forall x \\, \\psi[s]\n        \\quad \\text{iff} \\quad\n        \\text{for all } a \\in M, \\ \\mathcal{M} \\models \\psi[s[x \\mapsto a]].$$\n\n**Notation:** The assignment $s[x \\mapsto a]$ denotes the function that\nagrees with $s$ on all variables except possibly $x$, and sends $x$ to\n$a$.\n\n**Remark:** If $\\varphi$ is a sentence (i.e., has no free variables),\nthen its truth does not depend on the assignment $s$, and we simply\nwrite $$\\mathcal{M} \\models \\varphi.$$\n\n::: theorem\n**Theorem 11**. *Every wff has a unique decomposition.*\n:::\n\n::: proof\n*Proof.* We prove this by induction on the construction of formulas.\n*Existence* follows directly from the inductive definition of wffs. For\n*uniqueness*, suppose a formula $\\varphi$ admits two decompositions\naccording to the formation rules. We argue by cases on the outermost\nform of $\\varphi$:\n\n- **Case 1: $\\varphi$ begins with a propositional variable.** By\n  definition, $\\varphi$ must be atomic. Since no atomic formula is a\n  prefix of another (or of a complex formula starting with symbols like\n  '(' or '$\\neg$'), the decomposition is unique.\n\n- **Case 2: $\\varphi$ begins with '$\\neg$'.** Then\n  $\\varphi \\equiv \\neg\\psi$ and $\\varphi \\equiv \\neg\\psi'$. This implies\n  $\\psi \\equiv \\psi'$. By the inductive hypothesis, $\\psi$ has a unique\n  decomposition.\n\n- **Case 3: $\\varphi$ begins with '('.** Then\n  $\\varphi \\equiv (\\psi \\circ \\theta)$ and\n  $\\varphi \\equiv (\\psi' \\star \\theta')$, where $\\circ, \\star$ are\n  binary connectives. Suppose $\\psi \\not\\equiv \\psi'$. Then one must be\n  a proper prefix of the other. Without loss of generality, let $\\psi$\n  be a proper prefix of $\\psi'$. Then we know that, $L(\\psi) = R(\\psi)$.\n  However, since $\\psi$ is a proper prefix of $\\psi'$, and $\\psi'$ is a\n  wff, any proper prefix of $\\psi'$ must have more left than right\n  parentheses. This is a contradiction. Thus, $\\psi \\equiv \\psi'$. It\n  follows that $\\circ$ must be the same symbol as $\\star$, and\n  consequently $\\theta \\equiv \\theta'$.\n\n- **Case 4: $\\varphi$ begins with a quantifier.** Then\n  $\\varphi \\equiv \\forall x \\psi$ and $\\varphi \\equiv \\forall y \\psi'$.\n  The symbol following '$\\forall$' must be the variable, so\n  $x \\equiv y$. This leaves $\\psi \\equiv \\psi'$, which is unique by the\n  inductive hypothesis.\n\nIn all cases, the outermost structure and the immediate subformulas are\nuniquely determined. By the induction hypothesis, the subformulas\nthemselves have unique decompositions. Therefore, $\\varphi$ has a unique\ndecomposition.\u00a0\u25fb\n:::\n\n::: corollary\n**Corollary 1**. *$\\bar s$ is well-defined.*\n:::\n\n**An Example to bring everything together:** We define a first-order\nlanguage for graph theory.\n\n- A (possibly empty) set of constant symbols $\\{c_i\\}_{i \\in I}$, which\n  may be used to name specific vertices.\n\n- A single binary relation symbol $E$, intended to represent the edge\n  relation.\n\n- No function symbols.\n\nAn $\\mathcal{L}$-structure $\\mathcal{M}$ for this language consists of:\n\n- A non-empty set $V$, whose elements are interpreted as the vertices of\n  the graph.\n\n- An interpretation $E^{\\mathcal{M}} \\subseteq V \\times V$, representing\n  the edge relation.\n\n- For each constant symbol $c_i$, an element $c_i^{\\mathcal{M}} \\in V$.\n\n**Interpretation:** The pair $(V, E^{\\mathcal{M}})$ can be viewed as a\n(directed) graph. If we wish to model undirected graphs, we may impose\nthe additional condition:\n$$(x,y) \\in E^{\\mathcal{M}} \\iff (y,x) \\in E^{\\mathcal{M}}.$$\n\n**Example Formula:** The formula\n$$\\forall x \\, \\forall y \\, \\big(E(x,y) \\rightarrow E(y,x)\\big)$$\nexpresses that the graph is undirected.\n\n**Claim:** It $s_1$ and $s_2$ agree on the free variables of a term $t$,\nthen $s_1(t)=s_2(t)$.\n\n::: proof\n*Proof.* We prove this by structural induction on terms.\n\n**Base Case:** Let $t$ be a variable. Then clearly it's a free variable,\nhence, $s_1(t)=s_2(t)$. The statement is vacuously true if $t$ is a\nconstant.\n\n**Inductive Step:** Let the property hold for $t_1,\\dots, t_n$ terms.\nLet $f$ be an $n$-ary function. Then,\n$$s_1(f(t_1,\\dots,t_n))=f^\\mathcal M(s_1(t_1), \\dots,s_1(t_n)) \\text{ and }s_2(f(t_1,\\dots,t_n))=f^\\mathcal M(s_2(t_1), \\dots,s_2(t_n))$$\nRecall that by the inductive hypothesis $s_1(t_i)=s_2(t_i)$ for all\n$i\\in 1,\\dots, n$. Hence,\n$s_1(f(t_1,\\dots,t_n))=s_2(f(t_1,\\dots,t_n))$.\u00a0\u25fb\n:::\n\n::: lemma\n**Lemma 6**. *Let $\\varphi$ be a wff in some language $\\mathcal L$ with\na structure $\\mathcal M$. Then, given two assignments $s_1$ and $s_2$,\nif they agree on all free variables of $\\varphi$, then\n$\\mathcal M\\models_{s_1} \\varphi$ iff $\\mathcal \\models_{s_2}\\varphi$.*\n:::\n\n::: proof\n*Proof.* We proceed with structural induction on $\\varphi$.\n\n**Base Case:** $\\varphi$ is an atomic formula.\n\n- $\\varphi\\equiv (t_1=t_2)$: $\\mathcal M\\models_{s_1} \\varphi$ iff\n  $s_1(t_1)=s_1(t_2)$. By the earlier claim, we saw that $s_1(t)=s_2(t)$\n  for all terms $t$. Hence, $\\mathcal M\\models_{s_1} \\varphi$ iff\n  $s_2(t_1)=s_2(t_2)$ iff $\\mathcal M\\models_{s_2} \\varphi$\n\n- $\\varphi \\equiv R(t_1,\\dots,t_n)$: $\\mathcal M\\models_{s_1} \\varphi$\n  iff $(s_1(t_1),\\dots, s_1(t_n))\\in R^\\mathcal M$. Again, by the\n  earlier claim, we saw that $s_1(t)=s_2(t)$ for all terms $t$. Hence,\n  $\\mathcal M\\models_{s_1} \\varphi$ iff\n  $(s_2(t_1),\\dots, s_2(t_n))\\in R^\\mathcal M$ iff\n  $\\mathcal M\\models_{s_2} \\varphi$.\n\n**Inductive Hypothesis:** Let $\\psi$ and $\\phi$ satisfy the desired\nproperty.\n\n- $\\varphi\\equiv \\neg \\psi$: Then $\\mathbf F(\\varphi)=\\mathbf F(\\psi)$.\n  Hence, by the inductive hypothesis,\n  $\\mathcal M\\models_{s_1} \\varphi \\iff \\mathcal M\\models_{s_2}\\varphi$.\n\n- $\\varphi\\equiv \\psi \\land \\phi$: Then\n  ($\\mathcal M\\models_{s_1}\\varphi$) iff ($\\mathcal M\\models_{s_1}\\psi$\n  and $\\mathcal M\\models_{s_1} \\phi$) iff ($\\mathcal M\\models_{s_2}\\psi$\n  and $\\mathcal M\\models_{s_2}\\phi$ by induction hypothesis) iff\n  $(\\mathcal M\\models_{s_2}\\varphi)$.\n\n- $\\varphi\\equiv \\forall x\\psi$: Then\n  $\\mathbf F(\\varphi)=\\mathbf F(\\psi)\\setminus \\{x\\}$. Then\n  $\\mathcal M\\models_{s_1} \\forall x\\psi\\iff$ for all $a\\in M$,\n  $\\mathcal M\\models_{s_1[x\\to a]} \\psi \\iff$ for all $a\\i
